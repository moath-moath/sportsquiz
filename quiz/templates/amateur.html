<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المستوى الهاوي</title>

<style>

body{
background:#0d1b2a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.container{
width:90%;
max-width:600px;
margin:60px auto;
background:#1b263b;
padding:30px;
border-radius:15px;
}

button{
display:block;
width:90%;
margin:12px auto;
padding:14px;
font-size:18px;
font-weight:bold;
border-radius:10px;
border:none;
cursor:pointer;
background:#415a77;
color:white;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

#timer{
font-size:22px;
color:#ffd60a;
margin-bottom:10px;
}

#score{
font-size:22px;
color:#00e5ff;
margin-bottom:15px;
}

.correct{
background:#00c853 !important;
}

.wrong{
background:#d50000 !important;
}

</style>
</head>

<body>

<div class="container">

<h1>⚽ المستوى الهاوي</h1>

<div id="timer">⏳ الوقت: 10</div>

<div id="score">⭐ السكور: 0</div>

<h2 id="question"></h2>

<div id="answers"></div>

<h3 id="result"></h3>

<a href="/"><button>🏠 الرجوع للرئيسية</button></a>

</div>

<script>
let questions=[

{q:"من فاز بكأس العالم 2002؟",a:["ألمانيا","البرازيل","فرنسا","إيطاليا"],correct:1},
{q:"من سجل هدفي البرازيل في نهائي كأس العالم 2002؟",a:["رونالدو","ريفالدو","رونالدينيو","كافو"],correct:0},
{q:"من فاز بكأس العالم 1998؟",a:["البرازيل","فرنسا","إيطاليا","هولندا"],correct:1},
{q:"كم مرة فازت ألمانيا بكأس العالم؟",a:["2","3","4","5"],correct:2},
{q:"أي منتخب خسر نهائي كأس العالم 2018؟",a:["فرنسا","كرواتيا","بلجيكا","إنجلترا"],correct:1},

{q:"من سجل هدف فوز إسبانيا في نهائي 2010؟",a:["تشافي","إنييستا","فيلا","توريس"],correct:1},
{q:"أي منتخب فاز بيورو 2016؟",a:["فرنسا","البرتغال","إسبانيا","ألمانيا"],correct:1},
{q:"من سجل هدف فوز البرتغال في نهائي يورو 2016؟",a:["رونالدو","إيدر","بيبي","ناني"],correct:1},
{q:"أي منتخب فاز بيورو 2012؟",a:["إسبانيا","إيطاليا","ألمانيا","فرنسا"],correct:0},
{q:"من فاز بكوبا أمريكا 2021؟",a:["الأرجنتين","البرازيل","أوروغواي","تشيلي"],correct:0},

{q:"كم مرة فاز ريال مدريد بدوري أبطال أوروبا حتى 2024؟",a:["12","13","14","15"],correct:2},
{q:"من سجل هدف الفوز لريال مدريد في نهائي 2014؟",a:["راموس","بيل","رونالدو","بنزيما"],correct:1},
{q:"من سجل هدف التعادل لريال مدريد في نهائي 2014 بالدقيقة 93؟",a:["رونالدو","راموس","بيل","مودريتش"],correct:1},
{q:"أي فريق فاز بدوري أبطال أوروبا 2019؟",a:["ليفربول","توتنهام","برشلونة","يوفنتوس"],correct:0},
{q:"أي فريق فاز بدوري أبطال أوروبا 2020؟",a:["بايرن ميونخ","باريس","ريال مدريد","ليفربول"],correct:0},

{q:"من سجل هدف نهائي دوري الأبطال 2020؟",a:["ليفاندوفسكي","كومان","مولر","جنابري"],correct:1},
{q:"أي فريق فاز بدوري الأبطال 2021؟",a:["مانشستر سيتي","تشيلسي","ريال مدريد","ليفربول"],correct:1},
{q:"من سجل هدف نهائي دوري الأبطال 2021؟",a:["ماونت","هافيرتز","فيرنر","كانتي"],correct:1},
{q:"أي فريق فاز بدوري الأبطال 2022؟",a:["ليفربول","ريال مدريد","بايرن","سيتي"],correct:1},
{q:"من سجل هدف نهائي 2022؟",a:["بنزيما","فينيسيوس","مودريتش","كروس"],correct:1},

{q:"أي فريق فاز بالدوري الإنجليزي 2023؟",a:["أرسنال","مانشستر سيتي","ليفربول","تشيلسي"],correct:1},
{q:"أي فريق فاز بالدوري الإسباني 2023؟",a:["برشلونة","ريال مدريد","أتلتيكو مدريد","فالنسيا"],correct:0},
{q:"أي فريق فاز بالدوري الإيطالي 2023؟",a:["نابولي","يوفنتوس","إنتر","ميلان"],correct:0},
{q:"أي فريق فاز بالدوري الألماني 2022؟",a:["دورتموند","بايرن ميونخ","لايبزيغ","ليفركوزن"],correct:1},
{q:"أي فريق فاز بالدوري الفرنسي غالباً في آخر السنوات؟",a:["مارسيليا","ليون","باريس سان جيرمان","ليل"],correct:2},

{q:"من أكثر لاعب فاز بالكرة الذهبية؟",a:["ميسي","رونالدو","كرويف","بلاتيني"],correct:0},
{q:"كم كرة ذهبية فاز بها ميسي حتى 2023؟",a:["6","7","8","9"],correct:2},
{q:"من فاز بالكرة الذهبية 2018؟",a:["مودريتش","رونالدو","ميسي","غريزمان"],correct:0},
{q:"من فاز بالكرة الذهبية 2022؟",a:["ميسي","بنزيما","هالاند","مبابي"],correct:1},
{q:"من فاز بالحذاء الذهبي في كأس العالم 2018؟",a:["كين","مبابي","غريزمان","لوكاكو"],correct:0},

{q:"من فاز بكأس العالم 2022؟",a:["فرنسا","الأرجنتين","البرازيل","كرواتيا"],correct:1},
{q:"من سجل هاتريك في نهائي 2022؟",a:["ميسي","مبابي","دي ماريا","ألفاريز"],correct:1},
{q:"من فاز بجائزة أفضل لاعب في كأس العالم 2022؟",a:["ميسي","مبابي","مودريتش","غريزمان"],correct:0},
{q:"من حارس الأرجنتين في نهائي 2022؟",a:["إيميليانو مارتينيز","روميرو","أرماني","أوتامندي"],correct:0},
{q:"كم انتهت نتيجة نهائي كأس العالم 2022؟",a:["2-1","3-2","3-3","4-2"],correct:2},

{q:"ما ملعب برشلونة الشهير؟",a:["كامب نو","سانتياغو برنابيو","أنفيلد","أولد ترافورد"],correct:0},
{q:"ما ملعب ريال مدريد؟",a:["كامب نو","البرنابيو","ويمبلي","أليانز أرينا"],correct:1},
{q:"ما ملعب بايرن ميونخ؟",a:["سيغنال إيدونا","أليانز أرينا","ويمبلي","أنفيلد"],correct:1},
{q:"ما ملعب ليفربول؟",a:["أنفيلد","أولد ترافورد","الاتحاد","ويمبلي"],correct:0},
{q:"ما ملعب مانشستر يونايتد؟",a:["أنفيلد","أولد ترافورد","الاتحاد","ويمبلي"],correct:1},

{q:"من أسطورة الأرجنتين في 1986؟",a:["ميسي","مارادونا","باتيستوتا","تيفيز"],correct:1},
{q:"من أسطورة البرازيل في 1970؟",a:["بيليه","رونالدو","ريفالدو","زيكو"],correct:0},
{q:"أي لاعب اشتهر بلقب الظاهرة؟",a:["رونالدو البرازيلي","رونالدينيو","رونالدو البرتغالي","نيمار"],correct:0},
{q:"أي لاعب برتغالي فاز بيورو 2016؟",a:["رونالدو","ناني","ديكو","فيغو"],correct:0},
{q:"من هداف كأس العالم 2014؟",a:["مولر","خاميس رودريغيز","ميسي","نيمار"],correct:1}

]
let currentQuestion=0
let score=0
let timer
let time=10

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
[array[i],array[j]]=[array[j],array[i]]
}
}

shuffle(questions)

function startTimer(){

clearInterval(timer)

time=10

document.getElementById("timer").innerText="⏳ الوقت: "+time

timer=setInterval(()=>{

time--

document.getElementById("timer").innerText="⏳ الوقت: "+time

if(time<=0){

clearInterval(timer)

autoAnswer()

}

},1000)

}

function autoAnswer(){

let q=questions[currentQuestion]

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

buttons[q.correct].classList.add("correct")

document.getElementById("result").innerText="⏰ انتهى الوقت!"

setTimeout(nextQuestion,1200)

}

function showQuestion(){

if(currentQuestion>=questions.length){
showFinal()
return
}

startTimer()

let q=questions[currentQuestion]

document.getElementById("question").innerText=q.q

let answersDiv=document.getElementById("answers")

answersDiv.innerHTML=""

q.a.forEach((answer,index)=>{

let btn=document.createElement("button")

btn.innerText=answer

btn.onclick=function(){

clearInterval(timer)

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

if(index===q.correct){

score++

document.getElementById("score").innerText="⭐ السكور: "+score

btn.classList.add("correct")

document.getElementById("result").innerText="✅ إجابة صحيحة!"

}else{

btn.classList.add("wrong")

buttons[q.correct].classList.add("correct")

document.getElementById("result").innerText="❌ إجابة خاطئة"

}

setTimeout(nextQuestion,1200)

}

answersDiv.appendChild(btn)

})

}

function nextQuestion(){

currentQuestion++

document.getElementById("result").innerText=""

showQuestion()

}

function showFinal(){

document.getElementById("question").innerText="🎉 انتهت الأسئلة"

document.getElementById("answers").innerHTML=""

document.getElementById("timer").innerText=""

document.getElementById("result").innerHTML=

"⭐ نتيجتك: "+score+" / "+questions.length+

"<br><br><button onclick='restartGame()'>🔄 إعادة اللعب</button>"

}

function restartGame(){

score=0
currentQuestion=0

document.getElementById("score").innerText="⭐ السكور: 0"

shuffle(questions)

showQuestion()

}

showQuestion()

</script>

</body>
</html>
