<html lang="ar">
<head>
<meta charset="UTF-8">

<style>

body{
background:#0d1b2a;
font-family:Arial;

text-align:center;
margin:0;
}

.container{
width:90%;

margin:60px auto;

border-radius:15px;
}

button{

padding:14px;

border:none;
cursor:pointer;
background:#415a77;

transition:0.2s;
}

button:hover{

}

margin-bottom:10px;
}

#score{
font-size:22px;
color:#00e5ff;

}

.correct{
background:#00c853 !important;
}

.wrong{

}

  font-size: 20px;

  margin-bottom: 10px;
}

</style>
</head>

<body>

<div class="container">

<h1>⚽ المستوى الهاوي</h1>

<div id="timer">⏳ الوقت: 20</div>

<div id="score">⭐ السكور: 0</div>
<div id="questionNumber">السؤال 1 / 50</div>

<h2 id="question"></h2>

<div id="answers"></div>

<!-- زر تخطي السؤال -->
<button id="skipBtn" style="background:#ff9800; color:white; padding:10px; margin:10px auto; border:none; border-radius:8px; cursor:pointer; display:block;">
⏭ تخطي السؤال
</button>

<h3 id="result"></h3>

<a href="/"><button>🏠 الرجوع للرئيسية</button></a>

</div>

<script>

{q:"من هو هداف ريال مدريد التاريخي؟",a:["كريستيانو رونالدو","بنزيما","راؤول","دي ستيفانو"],correct:0},
{q:"أي منتخب فاز بكأس العالم 2006؟",a:["إيطاليا","فرنسا","البرازيل","ألمانيا"],correct:0},
{q:"في أي نادي لعب رونالدينيو في أوروبا أولاً؟",a:["باريس سان جيرمان","برشلونة","ميلان","ريال مدريد"],correct:0},
{q:"كم مرة فازت الأرجنتين بكأس العالم؟",a:["3","2","4","1"],correct:0},
{q:"أي منتخب فاز بكأس العالم 1998؟",a:["فرنسا","البرازيل","إيطاليا","ألمانيا"],correct:0},

{q:"من فاز بالكرة الذهبية 2021؟",a:["ليونيل ميسي","رونالدو","ليفاندوفسكي","بنزيما"],correct:0},
{q:"أي نادي يلقب بالملكي؟",a:["ريال مدريد","برشلونة","تشيلسي","يوفنتوس"],correct:0},
{q:"كم مرة فاز ريال مدريد بدوري أبطال أوروبا حتى 2024؟",a:["14","12","10","8"],correct:0},
{q:"في أي دولة يلعب نادي بايرن ميونخ؟",a:["ألمانيا","فرنسا","إيطاليا","إسبانيا"],correct:0},
{q:"من هو هداف برشلونة التاريخي؟",a:["ميسي","سواريز","رونالدينيو","نيمار"],correct:0},

{q:"أي نادي يلعب في ملعب أنفيلد؟",a:["ليفربول","مانشستر سيتي","أرسنال","تشيلسي"],correct:0},
{q:"من هو مدرب مانشستر سيتي الشهير؟",a:["بيب غوارديولا","مورينيو","أنشيلوتي","كلوب"],correct:0},
{q:"أي منتخب فاز بكأس العالم 2002؟",a:["البرازيل","ألمانيا","فرنسا","إيطاليا"],correct:0},
{q:"في أي نادي لعب ديفيد بيكهام معظم مسيرته؟",a:["مانشستر يونايتد","ريال مدريد","ميلان","باريس"],correct:0},
{q:"أي منتخب فاز بكأس أوروبا 2016؟",a:["البرتغال","فرنسا","إسبانيا","ألمانيا"],correct:0},

{q:"ما اسم ملعب برشلونة؟",a:["كامب نو","سانتياغو برنابيو","أنفيلد","أليانز أرينا"],correct:0},
{q:"ما اسم ملعب ريال مدريد؟",a:["سانتياغو برنابيو","كامب نو","أولد ترافورد","ويمبلي"],correct:0},
{q:"من فاز بكأس العالم 2018؟",a:["فرنسا","كرواتيا","البرازيل","الأرجنتين"],correct:0},
{q:"أي لاعب سجل هدف يد الله؟",a:["مارادونا","ميسي","رونالدو","بيليه"],correct:0},
{q:"أي منتخب فاز بكأس العالم 1970؟",a:["البرازيل","إيطاليا","ألمانيا","الأرجنتين"],correct:0},

{q:"من هو هداف كأس العالم 2018؟",a:["هاري كين","مبابي","لوكاكو","غريزمان"],correct:0},
{q:"أي نادي إيطالي يلعب في ملعب سان سيرو؟",a:["ميلان","يوفنتوس","روما","نابولي"],correct:0},
{q:"أي نادي إيطالي يلعب أيضاً في سان سيرو؟",a:["إنتر ميلان","يوفنتوس","لاتسيو","روما"],correct:0},
{q:"من فاز بالكرة الذهبية 2018؟",a:["لوكا مودريتش","ميسي","رونالدو","نيمار"],correct:0},
{q:"أي لاعب برازيلي لقب بالظاهرة؟",a:["رونالدو","رونالدينيو","نيمار","كاكا"],correct:0},

{q:"من هو أسطورة الأرجنتين التاريخية؟",a:["مارادونا","ميسي","باتيستوتا","أغويرو"],correct:0},
{q:"في أي نادي لعب إبراهيموفيتش في إيطاليا؟",a:["ميلان","ريال مدريد","برشلونة","تشيلسي"],correct:0},
{q:"أي منتخب فاز بكأس آسيا 2019؟",a:["قطر","اليابان","كوريا الجنوبية","أستراليا"],correct:0},
{q:"من هو هداف مانشستر يونايتد التاريخي؟",a:["واين روني","رونالدو","جيجز","سكولز"],correct:0},
{q:"أي نادي يلعب في ملعب أولد ترافورد؟",a:["مانشستر يونايتد","مانشستر سيتي","ليفربول","تشيلسي"],correct:0},

{q:"من فاز بدوري أبطال أوروبا 2022؟",a:["ريال مدريد","ليفربول","مانشستر سيتي","بايرن"],correct:0},
{q:"أي منتخب فاز بكأس العالم 1986؟",a:["الأرجنتين","البرازيل","ألمانيا","إيطاليا"],correct:0},
{q:"أي منتخب فاز بكأس العالم 1994؟",a:["البرازيل","إيطاليا","ألمانيا","الأرجنتين"],correct:0},
{q:"أي منتخب فاز بكأس العالم 1978؟",a:["الأرجنتين","البرازيل","هولندا","ألمانيا"],correct:0},
{q:"من فاز بكأس العالم 2010؟",a:["إسبانيا","هولندا","ألمانيا","البرازيل"],correct:0},

{q:"أي لاعب فرنسي مشهور في ريال مدريد؟",a:["بنزيما","مبابي","جيرو","غريزمان"],correct:0},
{q:"أي لاعب برازيلي لعب في برشلونة وميلان؟",a:["رونالدينيو","كاكا","رونالدو","نيمار"],correct:0},
{q:"أي نادي إنجليزي فاز بدوري الأبطال 2019؟",a:["ليفربول","توتنهام","تشيلسي","أرسنال"],correct:0},
{q:"أي لاعب سجل أكثر أهداف في تاريخ كأس العالم؟",a:["كلوزه","رونالدو البرازيلي","مولر","ميسي"],correct:0},
{q:"أي منتخب فاز بكأس العالم أول مرة؟",a:["الأوروغواي","البرازيل","الأرجنتين","إيطاليا"],correct:0},
{q:"في أي دولة أقيم كأس العالم 2022؟",a:["قطر","روسيا","البرازيل","فرنسا"],correct:0},
{q:"من هو مدرب ريال مدريد 2024؟",a:["أنشيلوتي","غوارديولا","كلوب","مورينيو"],correct:0},
{q:"أي منتخب فاز بكأس العالم 1958؟",a:["البرازيل","السويد","إيطاليا","ألمانيا"],correct:0},
{q:"أي لاعب يلقب بالبرغوث؟",a:["ميسي","نيمار","رونالدو","سواريز"],correct:0},
{q:"أي منتخب فاز بكأس العالم 1966؟",a:["إنجلترا","البرازيل","ألمانيا","إيطاليا"],correct:0},

]

let currentQuestion = 0
let score = 0
let timer
let time = 20

// خلط الأسئلة
function shuffle(array){
  for(let i = array.length - 1; i > 0; i--){
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

shuffle(questions);

// خلط إجابات السؤال
function shuffleAnswers(question){
  let answers = question.a.map((answer,index)=>({text:answer, correct:index===question.correct}));
  for(let i = answers.length-1; i>0; i--){
    let j = Math.floor(Math.random()*(i+1));
    [answers[i], answers[j]] = [answers[j], answers[i]];
  }
  question.a = answers.map(a=>a.text);
  question.correct = answers.findIndex(a=>a.correct);
}

// بدء عداد الوقت
function startTimer(){
  clearInterval(timer);
  time = 20;
  document.getElementById("timer").innerText = "⏳ الوقت: " + time;

  timer = setInterval(function(){
    time--;
    document.getElementById("timer").innerText = "⏳ الوقت: " + time;
    if(time <= 0){
      clearInterval(timer);
      autoAnswer();
    }
  },1000);
}

// انتهاء الوقت تلقائياً
function autoAnswer(){
  let q = questions[currentQuestion];
  let buttons = document.querySelectorAll("#answers button");
  buttons.forEach(b => b.disabled = true);
  if(buttons[q.correct]){
    buttons[q.correct].classList.add("correct");
  }
  document.getElementById("result").innerText = "⏰ انتهى الوقت";
  setTimeout(nextQuestion,1200);
}

// عرض السؤال
function showQuestion(){
  if(currentQuestion >= questions.length){
    showFinal();
    return;
  }

  let q = questions[currentQuestion];
  document.getElementById("questionNumber").innerText = "السؤال " + (currentQuestion + 1) + " من " + questions.length;
  document.getElementById("result").innerText = ""; // مسح النتيجة القديمة
  shuffleAnswers(q);
  startTimer();
  document.getElementById("question").innerText = q.q;

  let answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.a.forEach((answer,index)=>{
    let btn = document.createElement("button");
    btn.innerText = answer;

    btn.onclick = function(){
      clearInterval(timer);
      let buttons = document.querySelectorAll("#answers button");
      buttons.forEach(b => b.disabled = true);

      if(index === q.correct){
        score++;
        document.getElementById("score").innerText = "⭐ السكور: " + score;
        btn.classList.add("correct");
        document.getElementById("result").innerText = "✅ إجابة صحيحة";
      } else {
        btn.classList.add("wrong");
        buttons[q.correct].classList.add("correct");
        document.getElementById("result").innerText = "❌ إجابة خاطئة";
      }

      setTimeout(nextQuestion,1200);
    };

    answersDiv.appendChild(btn);
  });
}

// الانتقال للسؤال التالي
function nextQuestion(){
  currentQuestion++;
  showQuestion();
}

// زر تخطي السؤال
document.getElementById("skipBtn").onclick = function(){
  clearInterval(timer);
  document.getElementById("result").innerText = "⏭ تم تخطي السؤال";
  currentQuestion++;
  setTimeout(showQuestion,500);
}

// نهاية اللعبة
function showFinal(){
  clearInterval(timer);
  document.getElementById("question").innerText = "🎉 انتهت اللعبة";
  document.getElementById("answers").innerHTML = "";
  document.getElementById("timer").innerText = "";
  document.getElementById("result").innerHTML = "⭐ نتيجتك: " + score + " / " + questions.length +
    "<br><br><button onclick='restartGame()'>🔄 إعادة اللعب</button>";
}

// إعادة تشغيل اللعبة
function restartGame(){
  clearInterval(timer);
  score = 0;
  currentQuestion = 0;
  document.getElementById("score").innerText = "⭐ السكور: 0";
  shuffle(questions);
  showQuestion();
}

// بدء اللعبة
showQuestion();

</script>

</body>
</html>
