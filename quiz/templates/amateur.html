<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المستوى الهاوي</title>

<style>

body{
background:#0d1b2a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.container{
width:90%;
max-width:600px;
margin:60px auto;
background:#1b263b;
padding:30px;
border-radius:15px;
}

button{
display:block;
width:90%;
margin:12px auto;
padding:14px;
font-size:18px;
font-weight:bold;
border-radius:10px;
border:none;
cursor:pointer;
background:#415a77;
color:white;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

#timer{
font-size:22px;
color:#ffd60a;
margin-bottom:10px;
}

#score{
font-size:22px;
color:#00e5ff;
margin-bottom:15px;
}

.correct{
background:#00c853 !important;
}

.wrong{
background:#d50000 !important;
}

</style>
</head>

<body>

<div class="container">

<h1>⚽ المستوى الهاوي</h1>

<div id="timer">⏳ الوقت: 10</div>

<div id="score">⭐ السكور: 0</div>

<h2 id="question"></h2>

<div id="answers"></div>

<h3 id="result"></h3>

<a href="/"><button>🏠 الرجوع للرئيسية</button></a>

</div>
<script>

let questions=[

{q:"من فاز بكأس العالم 2002؟",a:["ألمانيا","البرازيل","فرنسا","إيطاليا"],correct:1},
{q:"من فاز بكأس العالم 1998؟",a:["البرازيل","فرنسا","إيطاليا","هولندا"],correct:1},
{q:"كم مرة فازت ألمانيا بكأس العالم؟",a:["2","3","4","5"],correct:2},
{q:"أي منتخب خسر نهائي كأس العالم 2018؟",a:["فرنسا","كرواتيا","بلجيكا","إنجلترا"],correct:1},
{q:"من سجل هدف فوز إسبانيا في نهائي 2010؟",a:["تشافي","إنييستا","فيلا","توريس"],correct:1},
{q:"أي منتخب فاز بيورو 2016؟",a:["فرنسا","البرتغال","إسبانيا","ألمانيا"],correct:1},
{q:"من فاز بكوبا أمريكا 2021؟",a:["الأرجنتين","البرازيل","أوروغواي","تشيلي"],correct:0},
{q:"أي فريق فاز بدوري أبطال أوروبا 2020؟",a:["بايرن ميونخ","باريس","ريال مدريد","ليفربول"],correct:0},
{q:"أي فريق فاز بدوري الأبطال 2022؟",a:["ليفربول","ريال مدريد","بايرن","سيتي"],correct:1},
{q:"من فاز بكأس العالم 2022؟",a:["فرنسا","الأرجنتين","البرازيل","كرواتيا"],correct:1},

{q:"كم كرة ذهبية فاز بها ميسي حتى 2023؟",a:["6","7","8","9"],correct:2},
{q:"من فاز بالكرة الذهبية 2018؟",a:["مودريتش","رونالدو","ميسي","غريزمان"],correct:0},
{q:"من فاز بالكرة الذهبية 2022؟",a:["ميسي","بنزيما","هالاند","مبابي"],correct:1},

{q:"ما ملعب برشلونة الشهير؟",a:["كامب نو","البرنابيو","أنفيلد","أولد ترافورد"],correct:0},
{q:"ما ملعب ريال مدريد؟",a:["كامب نو","البرنابيو","ويمبلي","أليانز"],correct:1},
{q:"ما ملعب بايرن ميونخ؟",a:["سيغنال إيدونا","أليانز أرينا","ويمبلي","أنفيلد"],correct:1},
{q:"ما ملعب ليفربول؟",a:["أنفيلد","أولد ترافورد","الاتحاد","ويمبلي"],correct:0},

{q:"من أسطورة الأرجنتين 1986؟",a:["ميسي","مارادونا","باتيستوتا","تيفيز"],correct:1},
{q:"من أسطورة البرازيل 1970؟",a:["بيليه","رونالدو","ريفالدو","زيكو"],correct:0},
{q:"أي لاعب لقب بالظاهرة؟",a:["رونالدو البرازيلي","رونالدينيو","رونالدو البرتغالي","نيمار"],correct:0}

]

let currentQuestion=0
let score=0
let timer
let time=10

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
[array[i],array[j]]=[array[j],array[i]]
}
}

shuffle(questions)

function startTimer(){

clearInterval(timer)

time=10

document.getElementById("timer").innerText="⏳ الوقت: "+time

timer=setInterval(()=>{

time--

document.getElementById("timer").innerText="⏳ الوقت: "+time

if(time<=0){

clearInterval(timer)

autoAnswer()

}

},1000)

}

function autoAnswer(){

let q=questions[currentQuestion]

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

if(buttons[q.correct]){
buttons[q.correct].classList.add("correct")
}

document.getElementById("result").innerText="⏰ انتهى الوقت"

setTimeout(nextQuestion,1200)

}

function showQuestion(){

if(currentQuestion>=questions.length){
showFinal()
return
}

document.getElementById("result").innerText=""

startTimer()

let q=questions[currentQuestion]

document.getElementById("question").innerText=q.q

let answersDiv=document.getElementById("answers")

answersDiv.innerHTML=""

q.a.forEach((answer,index)=>{

let btn=document.createElement("button")

btn.innerText=answer

btn.onclick=function(){

clearInterval(timer)

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

if(index===q.correct){

score++

document.getElementById("score").innerText="⭐ السكور: "+score

btn.classList.add("correct")

document.getElementById("result").innerText="✅ إجابة صحيحة"

}else{

btn.classList.add("wrong")

if(buttons[q.correct]){
buttons[q.correct].classList.add("correct")
}

document.getElementById("result").innerText="❌ إجابة خاطئة"

}

setTimeout(nextQuestion,1200)

}

answersDiv.appendChild(btn)

})

}

function nextQuestion(){

currentQuestion++

showQuestion()

}

function showFinal(){

document.getElementById("question").innerText="🎉 انتهت اللعبة"

document.getElementById("answers").innerHTML=""

document.getElementById("timer").innerText=""

document.getElementById("result").innerHTML=

"⭐ نتيجتك: "+score+" / "+questions.length+

"<br><br><button onclick='restartGame()'>🔄 إعادة اللعب</button>"

}

function restartGame(){

score=0
currentQuestion=0

document.getElementById("score").innerText="⭐ السكور: 0"

shuffle(questions)

showQuestion()

}

showQuestion()

</script>

</body>
</html>
