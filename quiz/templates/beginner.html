<!DOCTYPE html>
<html>
<head>
<title>المستوى المبتدئ</title>

<style>

body{
background-color:#0d1b2a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.container{
width:80%;
max-width:600px;
margin:80px auto;
background-color:#1b263b;
padding:30px;
border-radius:15px;
}

button{
display:block;
width:80%;
margin:12px auto;
padding:14px;
font-size:20px;
font-weight:bold;
border-radius:10px;
border:none;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

#timer{
font-size:22px;
margin:10px;
color:#ffd600;
}

.home-btn{
background:#ffd600;
color:black;
margin-top:20px;
}

.score{
font-size:24px;
margin-top:20px;
color:#00e676;
}

</style>
</head>

<body>

<div class="container">

<h1>💀 المستوى المبتدئ</h1>

<h2 id="question"></h2>

<div id="timer"></div>

<div id="answers"></div>

<h3 id="result"></h3>

<div id="score" class="score"></div>

<a href="/"><button class="home-btn">🏠 الرجوع للرئيسية</button></a>

</div>

<script>

let questions=[

{q:"كم لاعب من كل فريق يكون داخل الملعب في كرة القدم؟",a:["9","10","11","12"],correct:2},
{q:"كم مدة مباراة كرة القدم الرسمية؟",a:["60 دقيقة","80 دقيقة","90 دقيقة","120 دقيقة"],correct:2},
{q:"ما لون البطاقة التي تعني الطرد من المباراة؟",a:["أصفر","أحمر","أزرق","أخضر"],correct:1},
{q:"ما لون البطاقة التي تعني الإنذار؟",a:["أصفر","أحمر","أزرق","أسود"],correct:0},
{q:"كم شوط تتكون منه مباراة كرة القدم؟",a:["1","2","3","4"],correct:1},
{q:"كم مدة الشوط الواحد في المباراة؟",a:["30 دقيقة","40 دقيقة","45 دقيقة","50 دقيقة"],correct:2},
{q:"ما اسم اللاعب الذي يحمي المرمى؟",a:["المهاجم","حارس المرمى","المدافع","المدرب"],correct:1},
{q:"كم مرمى يوجد في ملعب كرة القدم؟",a:["1","2","3","4"],correct:1},
{q:"ما اسم الكرة المستخدمة في اللعبة؟",a:["كرة القدم","كرة السلة","كرة اليد","كرة الطائرة"],correct:0},
{q:"ماذا يسمى إدخال الكرة إلى المرمى؟",a:["تمريرة","هدف","خطأ","ضربة"],correct:1}

];

let currentQuestion=0;
let timeLeft=10;
let timer;
let score=0;

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

shuffle(questions);

function startTimer(){

clearInterval(timer);

timeLeft=10;

document.getElementById("timer").innerText="⏳ الوقت: "+timeLeft;

timer=setInterval(()=>{

timeLeft--;

document.getElementById("timer").innerText="⏳ الوقت: "+timeLeft;

if(timeLeft<=0){
clearInterval(timer);
autoAnswer();
}

},1000);

}

function autoAnswer(){

let q=questions[currentQuestion];

let buttons=document.querySelectorAll("#answers button");

buttons.forEach(b=>b.disabled=true);

buttons[q.correct].style.backgroundColor="#00c853";

document.getElementById("result").innerText="⏰ انتهى الوقت! الإجابة: "+q.a[q.correct];

currentQuestion++;

setTimeout(nextQuestion,1200);

}

function showQuestion(){

startTimer();

let q=questions[currentQuestion];

shuffleAnswers(q);

document.getElementById("question").innerText=q.q;

let answersDiv=document.getElementById("answers");

answersDiv.innerHTML="";

q.a.forEach((answer,index)=>{

let btn=document.createElement("button");

btn.innerText=answer;

btn.onclick=function(){

clearInterval(timer);

let buttons=document.querySelectorAll("#answers button");

buttons.forEach(b=>b.disabled=true);

if(index===q.correct){

btn.style.backgroundColor="#00c853";

document.getElementById("result").innerText="✅ إجابة صحيحة!";

score++;

}else{

btn.style.backgroundColor="#d50000";

buttons[q.correct].style.backgroundColor="#00c853";

document.getElementById("result").innerText="❌ الإجابة الصحيحة: "+q.a[q.correct];

}

currentQuestion++;

setTimeout(nextQuestion,1200);

};

answersDiv.appendChild(btn);

});

}

function nextQuestion(){

document.getElementById("result").innerText="";

if(currentQuestion<questions.length){

showQuestion();

}else{

showFinalScore();

}

}

function showFinalScore(){

document.getElementById("question").innerText="🎉 انتهت الأسئلة";

document.getElementById("answers").innerHTML="";

document.getElementById("timer").innerText="";

document.getElementById("score").innerText="⭐ نتيجتك: "+score+" / "+questions.length;

}

function shuffleAnswers(question){

let correctAnswer=question.a[question.correct];

for(let i=question.a.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));

[question.a[i],question.a[j]]=[question.a[j],question.a[i]];

}

question.correct=question.a.indexOf(correctAnswer);

}

showQuestion();

</script>

</body>
</html>
