<!DOCTYPE html>
<html lang="ar">

<head>
<meta charset="UTF-8">
<title>المستوى المبتدئ</title>

<style>

body{
background-color:#0d1b2a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.container{
width:80%;
max-width:600px;
margin:60px auto;
background:#1b263b;
padding:30px;
border-radius:15px;
}

button{
display:block;
width:80%;
margin:12px auto;
padding:14px;
font-size:20px;
font-weight:bold;
border-radius:10px;
border:none;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

#timer{
font-size:22px;
margin:10px;
color:#ffd600;
}

#visitors{
margin-bottom:15px;
color:#90caf9;
}

.home-btn{
background:#ffd600;
color:black;
margin-top:20px;
}

#score{
font-size:24px;
margin-bottom:10px;
color:#00e676;
}

.correct{
background:#00c853 !important;
}

.wrong{
background:#d50000 !important;
}

</style>
</head>

<body>

<div class="container">

<h1>المستوى المبتدئ</h1>

<div id="visitors">👥 الزوار الآن: <span id="online">...</span></div>

<h3 id="score">⭐ السكور: 0</h3>

<h2 id="question"></h2>

<div id="answers"></div>

<h3 id="result"></h3>

<div id="timer"></div>

<a href="/"><button class="home-btn">🏠 الرجوع للرئيسية</button></a>

</div>

<script>

let questions = [

{q:"كم عدد بطولات كأس العالم التي فازت بها البرازيل؟",a:["3","4","5","6"],correct:2},
{q:"من فاز بكأس العالم 2018؟",a:["فرنسا","كرواتيا","البرازيل","ألمانيا"],correct:0},
{q:"أي منتخب فاز بكأس العالم 2014؟",a:["الأرجنتين","ألمانيا","البرازيل","إسبانيا"],correct:1},
{q:"كم مدة مباراة كرة القدم؟",a:["80 دقيقة","90 دقيقة","100 دقيقة","120 دقيقة"],correct:1},
{q:"كم لاعب في فريق كرة القدم داخل الملعب؟",a:["9","10","11","12"],correct:2},
{q:"كم مدة الشوط الواحد؟",a:["40","45","50","60"],correct:1},
{q:"من فاز بكأس العالم 2010؟",a:["ألمانيا","هولندا","إسبانيا","إيطاليا"],correct:2},
{q:"في أي دولة أقيم كأس العالم 2022؟",a:["قطر","روسيا","البرازيل","ألمانيا"],correct:0},
{q:"أي منتخب فاز بكأس العالم 2006؟",a:["إيطاليا","فرنسا","البرازيل","ألمانيا"],correct:0},
{q:"أي منتخب فاز بكأس العالم 1994؟",a:["البرازيل","الأرجنتين","ألمانيا","إيطاليا"],correct:0}

]

let currentQuestion = 0
let timeLeft = 10
let timer = null
let score = 0

function shuffle(array){

for(let i = array.length - 1; i > 0; i--){

let j = Math.floor(Math.random() * (i + 1))

let temp = array[i]
array[i] = array[j]
array[j] = temp

}

}

shuffle(questions)

function startTimer(){

clearInterval(timer)

timeLeft = 10

document.getElementById("timer").innerText = "⏳ الوقت: " + timeLeft

timer = setInterval(function(){

timeLeft--

document.getElementById("timer").innerText = "⏳ الوقت: " + timeLeft

if(timeLeft <= 0){

clearInterval(timer)

autoAnswer()

}

},1000)

}

function autoAnswer(){

let q = questions[currentQuestion]

let buttons = document.querySelectorAll("#answers button")

buttons.forEach(function(b){

b.disabled = true

})

if(buttons[q.correct]){

buttons[q.correct].classList.add("correct")

}

document.getElementById("result").innerText = "⏰ انتهى الوقت"

setTimeout(nextQuestion,1200)

}

function showQuestion(){

if(currentQuestion >= questions.length){

showFinalScore()
return

}
let q=questions[currentQuestion]

startTimer()

document.getElementById("question").innerText = q.q

let answersDiv = document.getElementById("answers")

answersDiv.innerHTML = ""

q.a.forEach(function(answer,index){

let btn = document.createElement("button")

btn.innerText = answer

btn.onclick = function(){

clearInterval(timer)

let buttons = document.querySelectorAll("#answers button")

buttons.forEach(function(b){

b.disabled = true

})

if(index === q.correct){

btn.classList.add("correct")

document.getElementById("result").innerText = "✅ إجابة صحيحة"

score++

document.getElementById("score").innerText = "⭐ السكور: " + score

}else{

btn.classList.add("wrong")

if(buttons[q.correct]){

buttons[q.correct].classList.add("correct")

}

document.getElementById("result").innerText = "❌ إجابة خاطئة"

}



setTimeout(nextQuestion,1200)

}

answersDiv.appendChild(btn)

})

}

function nextQuestion(){

currentQuestion++

document.getElementById("result").innerText = ""

showQuestion()








}


function showFinalScore(){

clearInterval(timer)

document.getElementById("question").innerText = "🎉 انتهت اللعبة"

document.getElementById("answers").innerHTML = ""

document.getElementById("timer").innerText = ""

document.getElementById("score").innerHTML =
"⭐ نتيجتك: " + score + " / " + questions.length +
"<br><br><button onclick='restartGame()'>🔄 إعادة اللعب</button>"

}

function restartGame(){

clearInterval(timer)

score = 0
currentQuestion = 0

document.getElementById("score").innerText = "⭐ السكور: 0"

shuffle(questions)

showQuestion()

}

showQuestion()

setInterval(function(){

let online = Math.floor(Math.random() * 40) + 10

document.getElementById("online").innerText = online

},3000)

</script>

</body>
</html>
