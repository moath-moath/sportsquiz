<!DOCTYPE html>
<html lang="ar">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المستوى المبتدئ</title>

<style>

body{
background-color:#0d1b2a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.container{
width:80%;
max-width:600px;
margin:60px auto;
background:#1b263b;
padding:30px;
border-radius:15px;
}

button{
display:block;
width:92%;
max-width:500px;
margin:12px auto;
padding:16px;
font-size:18px;
font-weight:bold;

border-radius:12px;
border:none;

cursor:pointer;

background:#4a627f;   /* اللون السكني مثل الصورة */
color:white;

transition:0.25s;

}

button:hover{
transform:scale(1.04);
background:#5c7697;
}

#timer{
font-size:22px;
margin:10px;
color:#ffd600;
}

#visitors{
margin-bottom:15px;
color:#90caf9;
}

.home-btn{
background:#4a627f;
color:white;
}

#score{
font-size:24px;
margin-bottom:10px;
color:#00e676;
}

.correct{
background:#00c853 !important;
}

.wrong{
background:#d50000 !important;
}

</style>
</head>

<body>

<div class="container">

<h1>المستوى المبتدئ</h1>

<div id="timer">⏱ الوقت: <span id="time">30</span></div>


<h3 id="score">⭐ السكور: 0</h3>

<h2 id="question"></h2>

<div id="answers"></div>

<h3 id="result"></h3>



<a href="/"><button class="home-btn">🏠 الرجوع للرئيسية</button></a>

</div>

<script>

let questions = [

{q:"كم عدد لاعبي فريق كرة القدم في الملعب؟",a:["9","10","11","12"],correct:2},
{q:"ما لون البطاقة التي تعني طرد اللاعب؟",a:["الأصفر","الأحمر","الأزرق","الأخضر"],correct:1},
{q:"كم مدة مباراة كرة القدم؟",a:["60 دقيقة","70 دقيقة","80 دقيقة","90 دقيقة"],correct:3},
{q:"ما اسم البطولة الأكبر للمنتخبات؟",a:["كأس العالم","كأس آسيا","كأس أوروبا","كوبا أمريكا"],correct:0},
{q:"أي جزء من الجسم لا يسمح باستخدامه للاعبين غير الحارس؟",a:["الرأس","القدم","اليد","الكتف"],correct:2},
{q:"كم عدد الشوط في المباراة؟",a:["1","2","3","4"],correct:1},
{q:"ما اسم اللاعب الذي يحرس المرمى؟",a:["مدافع","حارس مرمى","مهاجم","وسط"],correct:1},
{q:"كم عدد الحكام داخل الملعب؟",a:["1","2","3","4"],correct:0},
{q:"ما اسم الضربة التي تبدأ بها المباراة؟",a:["ضربة البداية","ركلة جزاء","ركلة حرة","ضربة مرمى"],correct:0},
{q:"أي فريق يملك أكثر كأس عالم؟",a:["البرازيل","ألمانيا","إيطاليا","الأرجنتين"],correct:0},

{q:"كم عدد اللاعبين في الفريق الواحد؟",a:["11","10","9","12"],correct:0},
{q:"أي دولة فازت بكأس العالم 2018؟",a:["فرنسا","البرازيل","ألمانيا","إسبانيا"],correct:0},
{q:"أي نادي يلعب له ميسي سابقاً؟",a:["برشلونة","ريال مدريد","يوفنتوس","ميلان"],correct:0},
{q:"أي نادي يلعب له رونالدو سابقاً؟",a:["برشلونة","ريال مدريد","ليفربول","إنتر"],correct:1},
{q:"ما اسم البطولة الأوروبية للأندية؟",a:["دوري الأبطال","كأس العالم","كأس آسيا","كأس أفريقيا"],correct:0},
{q:"كم عدد القوائم في مرمى كرة القدم؟",a:["2","3","4","5"],correct:1},
{q:"ما اسم المنطقة أمام المرمى؟",a:["منطقة الجزاء","الوسط","الدفاع","الجناح"],correct:0},
{q:"ما اسم الركلة من نقطة الجزاء؟",a:["ركلة حرة","ركلة جزاء","ركلة ركنية","ضربة مرمى"],correct:1},
{q:"كم عدد زوايا الملعب؟",a:["2","3","4","5"],correct:2},
{q:"من يستخدم يده داخل المنطقة؟",a:["المهاجم","المدافع","الحارس","الحكم"],correct:2},

{q:"كم شوط إضافي في الوقت الإضافي؟",a:["1","2","3","4"],correct:1},
{q:"كم دقيقة الشوط الواحد؟",a:["45","40","30","50"],correct:0},
{q:"ما اسم الركلة من زاوية الملعب؟",a:["ركلة ركنية","ضربة مرمى","ركلة جزاء","ركلة حرة"],correct:0},
{q:"ما لون العشب في الملعب؟",a:["أزرق","أخضر","أصفر","أبيض"],correct:1},
{q:"كم فريق يلعب في المباراة؟",a:["2","3","4","5"],correct:0},
{q:"أي لاعب يسجل الأهداف غالباً؟",a:["مهاجم","مدافع","حارس","حكم"],correct:0},
{q:"كم عدد الأهداف للفوز عادة؟",a:["أكثر من الخصم","هدف واحد فقط","هدفين دائماً","3 أهداف"],correct:0},
{q:"ما شكل الكرة؟",a:["مربع","دائري","مثلث","مستطيل"],correct:1},
{q:"أي دولة مشهورة بكرة القدم؟",a:["البرازيل","اليابان","كندا","الهند"],correct:0},
{q:"ما اسم اللاعب الذي يقود الفريق؟",a:["القائد","المهاجم","الحارس","الحكم"],correct:0},

{q:"ما اسم الخط في وسط الملعب؟",a:["خط المنتصف","خط الدفاع","خط المرمى","خط الركنية"],correct:0},
{q:"كم حارس في الفريق؟",a:["1","2","3","4"],correct:0},
{q:"كم حكم مساعد؟",a:["2","3","4","1"],correct:0},
{q:"ما لون خطوط الملعب؟",a:["أبيض","أحمر","أزرق","أصفر"],correct:0},
{q:"ما اسم الكرة في الإنجليزية؟",a:["Ball","Goal","Kick","Play"],correct:0},
{q:"أي قدم يستخدمها اللاعب غالباً؟",a:["اليمنى","اليسرى","كلاهما","لا شيء"],correct:2},
{q:"ما اسم تسجيل الهدف؟",a:["Goal","Kick","Run","Stop"],correct:0},
{q:"أين يقف الحارس؟",a:["المرمى","الوسط","الهجوم","الجناح"],correct:0},
{q:"كم دقيقة الاستراحة؟",a:["15","10","5","20"],correct:0},
{q:"ما اسم الجمهور في الملعب؟",a:["المشجعين","اللاعبين","الحكام","المدربين"],correct:0},

{q:"ما اسم قائد الفريق؟",a:["الكابتن","الحارس","المهاجم","المدرب"],correct:0},
{q:"ما اسم المدرب؟",a:["Coach","Player","Referee","Fan"],correct:0},
{q:"ما اسم الحكم؟",a:["Referee","Coach","Fan","Goal"],correct:0},
{q:"ما اسم الهدف؟",a:["Goal","Ball","Kick","Run"],correct:0},
{q:"ما اسم تمرير الكرة؟",a:["Pass","Shoot","Run","Jump"],correct:0},

{q:"كم هدف للفوز 1-0؟",a:["هدف","هدفين","3 أهداف","4"],correct:0},
{q:"هل يسمح بالدفع؟",a:["نعم","لا","أحياناً","دائماً"],correct:1},
{q:"هل يسمح بلمس الكرة باليد؟",a:["لا","نعم","أحياناً","دائماً"],correct:0},
{q:"كم فريق في المباراة؟",a:["2","3","4","5"],correct:0},
{q:"هل يمكن التعادل؟",a:["نعم","لا","أحياناً","مستحيل"],correct:0}

]

let currentQuestion = 0
let timeLeft = 20
let timer = null
let score = 0

function shuffle(array){

for(let i = array.length - 1; i > 0; i--){

let j = Math.floor(Math.random() * (i + 1))

let temp = array[i]
array[i] = array[j]
array[j] = temp

}

}

shuffle(questions)
function shuffleAnswers(question){

let answers = question.a.map((answer,index)=>({
text:answer,
correct:index === question.correct
}))

for(let i = answers.length-1; i>0; i--){

let j = Math.floor(Math.random()*(i+1))

let temp = answers[i]
answers[i] = answers[j]
answers[j] = temp

}

question.a = answers.map(a=>a.text)
question.correct = answers.findIndex(a=>a.correct)

}

function startTimer(){

clearInterval(timer)

timeLeft = 20

document.getElementById("timer").innerText = "⏳ الوقت: " + timeLeft

timer = setInterval(function(){

timeLeft--

document.getElementById("timer").innerText = "⏳ الوقت: " + timeLeft

if(timeLeft <= 0){

clearInterval(timer)

autoAnswer()

}

},1000)

}

function autoAnswer(){

let q = questions[currentQuestion]

let buttons = document.querySelectorAll("#answers button")

buttons.forEach(function(b){

b.disabled = true

})

if(buttons[q.correct]){

buttons[q.correct].classList.add("correct")

}

document.getElementById("result").innerText = "⏰ انتهى الوقت"

setTimeout(nextQuestion,1200)

}

function showQuestion(){

if(currentQuestion >= questions.length){

showFinalScore()
return

}

let q = questions[currentQuestion]

shuffleAnswers(q)

startTimer()

document.getElementById("question").innerText = q.q

let answersDiv = document.getElementById("answers")

answersDiv.innerHTML = ""

q.a.forEach(function(answer,index){

let btn = document.createElement("button")

btn.innerText = answer

btn.onclick = function(){

clearInterval(timer)

let buttons = document.querySelectorAll("#answers button")

buttons.forEach(function(b){
b.disabled = true


})

if(index === q.correct){

btn.classList.add("correct")

document.getElementById("result").innerText = "✅ إجابة صحيحة"

score++

document.getElementById("score").innerText = "⭐ السكور: " + score

}else{

btn.classList.add("wrong")

if(buttons[q.correct]){
buttons[q.correct].classList.add("correct")

}

document.getElementById("result").innerText = "❌ إجابة خاطئة"

}



setTimeout(nextQuestion,1200)

}

answersDiv.appendChild(btn)

})

}

function nextQuestion(){

currentQuestion++

document.getElementById("result").innerText = ""

showQuestion()








}


function showFinalScore(){

clearInterval(timer)

document.getElementById("question").innerText = "🎉 انتهت اللعبة"

document.getElementById("answers").innerHTML = ""

document.getElementById("timer").innerText = ""

document.getElementById("score").innerHTML =
"⭐ نتيجتك: " + score + " / " + questions.length +
"<br><br><button onclick='restartGame()'>🔄 إعادة اللعب</button>"

}

function restartGame(){

clearInterval(timer)

score = 0
currentQuestion = 0

document.getElementById("score").innerText = "⭐ السكور: 0"

shuffle(questions)

showQuestion()

}

showQuestion()

setInterval(function(){

let online = Math.floor(Math.random() * 40) + 10

document.getElementById("online").innerText = online

},3000)

</script>

</body>
</html>
