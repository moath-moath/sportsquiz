<!DOCTYPE html>
<html>
<head>
<title>المستوى المبتدئ</title>

<style>

body{
background-color:#0d1b2a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.container{
width:80%;
max-width:600px;
margin:60px auto;
background-color:#1b263b;
padding:30px;
border-radius:15px;
}

button{
display:block;
width:80%;
margin:12px auto;
padding:14px;
font-size:20px;
font-weight:bold;
border-radius:10px;
border:none;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

#timer{
font-size:22px;
margin:10px;
color:#ffd600;
}

#visitors{
margin-bottom:15px;
color:#90caf9;
}

.home-btn{
background:#ffd600;
color:black;
margin-top:20px;
}

#score{
font-size:24px;
margin-bottom:10px;
color:#00e676;
}

</style>
</head>

<body>

<div class="container">

<h1>المستوى المبتدئ</h1>

<div id="visitors">👥 الزوار الآن: <span id="online">...</span></div>

<h3 id="score">⭐ السكور: 0</h3>

<h2 id="question"></h2>

<div id="answers"></div>

<h3 id="result"></h3>

<div id="timer"></div>

<a href="/"><button class="home-btn">🏠 الرجوع للرئيسية</button></a>

</div>

<script>

let questions=[

{q:"كم عدد بطولات كأس العالم التي فازت بها البرازيل؟",a:["3","4","5","6"],correct:2},
{q:"من فاز بكأس العالم 2018؟",a:["فرنسا","كرواتيا","البرازيل","ألمانيا"],correct:0},
{q:"أي منتخب فاز بكأس العالم 2014؟",a:["الأرجنتين","ألمانيا","البرازيل","إسبانيا"],correct:1},
{q:"كم مدة مباراة كرة القدم؟",a:["80 دقيقة","90 دقيقة","100 دقيقة","120 دقيقة"],correct:1},
{q:"كم لاعب في فريق كرة القدم داخل الملعب؟",a:["9","10","11","12"],correct:2},
{q:"كم مدة الشوط الواحد؟",a:["40","45","50","60"],correct:1},
{q:"من فاز بكأس العالم 2010؟",a:["ألمانيا","هولندا","إسبانيا","إيطاليا"],correct:2},
{q:"في أي دولة أقيم كأس العالم 2022؟",a:["قطر","روسيا","البرازيل","ألمانيا"],correct:0},
{q:"أي منتخب فاز بكأس العالم 2006؟",a:["إيطاليا","فرنسا","البرازيل","ألمانيا"],correct:0},
{q:"أي منتخب فاز بكأس العالم 1994؟",a:["البرازيل","الأرجنتين","ألمانيا","إيطاليا"],correct:0},

{q:"كم عدد لاعبي فريق كرة السلة؟",a:["4","5","6","7"],correct:1},
{q:"كم عدد أشواط كرة السلة؟",a:["2","3","4","5"],correct:2},
{q:"كم لاعب في فريق الكرة الطائرة؟",a:["5","6","7","8"],correct:1},
{q:"كم لاعب في فريق كرة اليد؟",a:["6","7","8","9"],correct:1},
{q:"ما لون البطاقة التي تعني الطرد؟",a:["الصفراء","الحمراء","الزرقاء","الخضراء"],correct:1},

{q:"ما اسم البطولة الأوروبية للأندية؟",a:["الدوري الأوروبي","دوري أبطال أوروبا","كأس السوبر","كأس أوروبا"],correct:1},
{q:"ما اسم البطولة الإنجليزية؟",a:["البريميرليغ","لا ليغا","السيري أ","البوندسليغا"],correct:0},
{q:"ما اسم البطولة الإسبانية؟",a:["لا ليغا","البريميرليغ","الدوري الفرنسي","السيري أ"],correct:0},
{q:"ما اسم البطولة الإيطالية؟",a:["السيري أ","البوندسليغا","لا ليغا","الدوري الفرنسي"],correct:0},
{q:"ما اسم البطولة الألمانية؟",a:["السيري أ","البوندسليغا","لا ليغا","الدوري الفرنسي"],correct:1},

{q:"كم مرة تقام كأس العالم؟",a:["كل سنتين","كل 3 سنوات","كل 4 سنوات","كل 5 سنوات"],correct:2},
{q:"كم حكم في مباراة كرة القدم عادة؟",a:["2","3","4","5"],correct:2},
{q:"ما اسم الركلة من نقطة الجزاء؟",a:["ركلة حرة","ركلة ركنية","ركلة جزاء","ضربة مرمى"],correct:2},
{q:"ما اسم الضربة من زاوية الملعب؟",a:["ركنية","ضربة مرمى","ركلة حرة","رمية تماس"],correct:0},
{q:"كم فريق يشارك في المباراة؟",a:["1","2","3","4"],correct:1},

{q:"ما اسم أكبر بطولة كرة قدم؟",a:["كأس العالم","اليورو","كوبا أمريكا","أمم إفريقيا"],correct:0},
{q:"ما اسم بطولة أوروبا للمنتخبات؟",a:["اليورو","كوبا أمريكا","أمم إفريقيا","كأس آسيا"],correct:0},
{q:"ما اسم بطولة أمريكا الجنوبية؟",a:["اليورو","كوبا أمريكا","أمم إفريقيا","كأس آسيا"],correct:1},
{q:"ما اسم بطولة إفريقيا؟",a:["كأس آسيا","كوبا أمريكا","أمم إفريقيا","اليورو"],correct:2},
{q:"ما اسم بطولة آسيا؟",a:["كأس آسيا","أمم إفريقيا","اليورو","كوبا أمريكا"],correct:0},

{q:"ما اسم نادي مدريد الشهير؟",a:["ريال مدريد","برشلونة","فالنسيا","إشبيلية"],correct:0},
{q:"ما اسم نادي برشلونة؟",a:["ريال مدريد","برشلونة","أتلتيكو مدريد","فالنسيا"],correct:1},
{q:"ما اسم نادي مانشستر الأزرق؟",a:["مانشستر يونايتد","مانشستر سيتي","تشيلسي","ليفربول"],correct:1},
{q:"ما اسم نادي مانشستر الأحمر؟",a:["سيتي","يونايتد","تشيلسي","أرسنال"],correct:1},
{q:"ما اسم نادي باريس؟",a:["باريس سان جيرمان","ليون","مارسيليا","ليل"],correct:0},

{q:"ما اسم نادي ميلان الأحمر والأسود؟",a:["إنتر","ميلان","يوفنتوس","نابولي"],correct:1},
{q:"ما لقب نادي يوفنتوس؟",a:["السيدة العجوز","الملكي","البلوز","المدفعجية"],correct:0},
{q:"ما اسم نادي لندن الأحمر؟",a:["أرسنال","تشيلسي","توتنهام","فولهام"],correct:0},
{q:"ما اسم نادي لندن الأزرق؟",a:["تشيلسي","أرسنال","ويست هام","توتنهام"],correct:0},
{q:"كم دقيقة بين الشوطين؟",a:["10","15","20","25"],correct:1},

{q:"ما اسم اتحاد كرة القدم العالمي؟",a:["فيفا","يويفا","كاف","كونميبول"],correct:0},
{q:"كم لاعب احتياط في المباراة عادة؟",a:["5","6","7","8"],correct:2},
{q:"ما اسم الهدف بالرأس؟",a:["هدف رأسي","هدف أرضي","هدف طائر","هدف مباشر"],correct:0},
{q:"ما اسم الخطأ عندما تخرج الكرة من الجانب؟",a:["ركنية","رمية تماس","ضربة مرمى","ركلة حرة"],correct:1},
{q:"ما اسم الضربة الحرة المباشرة؟",a:["ركلة حرة","ركلة جزاء","ركنية","رمية تماس"],correct:0},

{q:"أي دولة فازت بكأس العالم 1970؟",a:["إيطاليا","البرازيل","ألمانيا","الأرجنتين"],correct:1},
{q:"أي دولة فازت بكأس العالم 1990؟",a:["ألمانيا","البرازيل","إيطاليا","فرنسا"],correct:0},
{q:"أي منتخب فاز بكأس العالم 1986؟",a:["الأرجنتين","البرازيل","إيطاليا","ألمانيا"],correct:0},
{q:"أي منتخب فاز بكأس العالم 1978؟",a:["الأرجنتين","البرازيل","إيطاليا","ألمانيا"],correct:0}

]

let currentQuestion=0
let timeLeft=10
let timer
let score=0

function shuffle(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

[array[i],array[j]]=[array[j],array[i]]

}

}

shuffle(questions)

function startTimer(){

clearInterval(timer)

timeLeft=10

document.getElementById("timer").innerText="⏳ الوقت: "+timeLeft

timer=setInterval(()=>{

timeLeft--

document.getElementById("timer").innerText="⏳ الوقت: "+timeLeft

if(timeLeft<=0){

clearInterval(timer)

autoAnswer()

}

},1000)

}

function autoAnswer(){

let q=questions[currentQuestion]

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

if(buttons[q.correct]){
buttons[q.correct].style.backgroundColor="#00c853"
}

document.getElementById("result").innerText="⏰ انتهى الوقت!"

currentQuestion++

setTimeout(nextQuestion,1200)

}

function showQuestion(){

startTimer()

let q=questions[currentQuestion]

document.getElementById("question").innerText=q.q

let answersDiv=document.getElementById("answers")

answersDiv.innerHTML=""

q.a.forEach((answer,index)=>{

let btn=document.createElement("button")

btn.innerText=answer

btn.onclick=function(){

clearInterval(timer)

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

if(index===q.correct){

btn.style.backgroundColor="#00c853"

document.getElementById("result").innerText="✅ إجابة صحيحة"

score++

document.getElementById("score").innerText="⭐ السكور: "+score

}else{

btn.style.backgroundColor="#d50000"

if(buttons[q.correct]){
buttons[q.correct].style.backgroundColor="#00c853"
}

document.getElementById("result").innerText="❌ إجابة خاطئة"

}

currentQuestion++

setTimeout(nextQuestion,1200)

}

answersDiv.appendChild(btn)

})

}

function nextQuestion(){

document.getElementById("result").innerText=""

if(currentQuestion<questions.length){

showQuestion()

}else{

showFinalScore()

}

}
function showFinalScore(){

document.getElementById("question").innerText="🎉 انتهت اللعبة"

document.getElementById("answers").innerHTML=""

document.getElementById("timer").innerText=""

document.getElementById("score").innerHTML=
"⭐ نتيجتك: "+score+" / "+questions.length+
"<br><br><button onclick='restartGame()'>🔄 إعادة اللعب</button>"

}

function restartGame(){

score=0
currentQuestion=0

document.getElementById("score").innerText="⭐ السكور: 0"

shuffle(questions)

showQuestion()

}

setInterval(()=>{

let online=Math.floor(Math.random()*40)+10

document.getElementById("online").innerText=online

},3000)

</script>

</body>
</html>
