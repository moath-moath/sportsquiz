
<!DOCTYPE html>
<html>
<head>
<title>المبتدئ</title>

<style>
body{
background-color:#0d1b2a;
font-family:Arial;
color:white;
text-align:center;
}

.container{
width:80%;
max-width:600px;
margin:80px auto;
background-color:#1b263b;
padding:30px;
border-radius:15px;
}

button{
display:block;
width:80%;
margin:12px auto;
padding:14px;
font-size:20px;
font-weight:bold;
border-radius:10px;
border:none;
cursor:pointer;
}

#timer{
font-size:22px;
margin:10px;
color:#ffd600;
}
</style>
</head>

<body>

<div class="container">

<h1>💀 المبتدئ</h1>

<h2 id="question"></h2>

<div id="timer"></div>

<div id="answers"></div>

<h3 id="result"></h3>

</div>

<script>

let questions=[
{q:"كم لاعب من كل فريق يكون داخل الملعب في كرة القدم؟",a:["9","10","11","12"],correct:2},
{q:"كم مدة مباراة كرة القدم الرسمية؟",a:["60 دقيقة","80 دقيقة","90 دقيقة","120 دقيقة"],correct:2},
{q:"ما لون البطاقة التي تعني الطرد من المباراة؟",a:["أصفر","أحمر","أزرق","أخضر"],correct:1},
{q:"ما لون البطاقة التي تعني الإنذار؟",a:["أصفر","أحمر","أزرق","أسود"],correct:0},
{q:"كم شوط تتكون منه مباراة كرة القدم؟",a:["1","2","3","4"],correct:1},
{q:"كم مدة الشوط الواحد في المباراة؟",a:["30 دقيقة","40 دقيقة","45 دقيقة","50 دقيقة"],correct:2},
{q:"ما اسم اللاعب الذي يحمي المرمى؟",a:["المهاجم","حارس المرمى","المدافع","المدرب"],correct:1},
{q:"كم مرمى يوجد في ملعب كرة القدم؟",a:["1","2","3","4"],correct:1},
{q:"ما اسم الكرة المستخدمة في اللعبة؟",a:["كرة القدم","كرة السلة","كرة اليد","كرة الطائرة"],correct:0},
{q:"ماذا يسمى إدخال الكرة إلى المرمى؟",a:["تمريرة","هدف","خطأ","ضربة"],correct:1},

{q:"في أي دولة ظهرت كرة القدم الحديثة؟",a:["البرازيل","إنجلترا","إسبانيا","فرنسا"],correct:1},
{q:"كم حكم ساحة يدير المباراة داخل الملعب؟",a:["1","2","3","4"],correct:0},
{q:"ما اسم اللاعب الذي يقود الفريق داخل الملعب؟",a:["القائد","الحارس","المدرب","المهاجم"],correct:0},
{q:"ماذا تسمى بداية المباراة عندما تبدأ اللعبة؟",a:["ضربة البداية","ركلة جزاء","ركلة ركنية","رمية تماس"],correct:0},
{q:"ماذا تسمى الركلة التي تنفذ من زاوية الملعب؟",a:["ركلة ركنية","ركلة جزاء","رمية تماس","ضربة حرة"],correct:0},
{q:"ماذا تسمى الرمية التي تنفذ عند خروج الكرة من الخط الجانبي؟",a:["رمية تماس","ركلة ركنية","ركلة جزاء","ضربة حرة"],correct:0},
{q:"كم عدد اللاعبين الاحتياط غالباً في قائمة المباراة الحديثة؟",a:["5","7","9","11"],correct:1},
{q:"كم شوط إضافي يُلعب عند التعادل في بعض البطولات؟",a:["1","2","3","4"],correct:1},
{q:"كم مدة كل شوط في الوقت الإضافي؟",a:["10 دقائق","15 دقيقة","20 دقيقة","25 دقيقة"],correct:1},
{q:"من يستطيع تسجيل هدف في المباراة؟",a:["أي لاعب","الحارس فقط","المدرب","الحكم"],correct:0},

{q:"ماذا تسمى الركلة التي تُمنح بعد ارتكاب خطأ؟",a:["ضربة حرة","ركلة ركنية","رمية تماس","ركلة بداية"],correct:0},
{q:"ماذا تسمى الركلة التي تنفذ من نقطة الجزاء؟",a:["ركلة جزاء","ضربة حرة","ركلة ركنية","رمية تماس"],correct:0},
{q:"كم تبعد نقطة ركلة الجزاء عن المرمى تقريباً؟",a:["11 متر","9 متر","15 متر","20 متر"],correct:0},
{q:"أي لاعب يسمح له باستخدام يديه داخل منطقة الجزاء؟",a:["حارس المرمى","المدافع","المهاجم","لا أحد"],correct:0},
{q:"من هو الشخص الذي يقود الفريق من خارج الملعب؟",a:["المدرب","الحارس","المهاجم","الحكم"],correct:0},
{q:"ما اسم اللاعب الذي تكون مهمته تسجيل الأهداف؟",a:["المهاجم","المدافع","الحارس","الحكم"],correct:0},
{q:"ما اسم اللاعب الذي تكون مهمته الدفاع عن المرمى؟",a:["المدافع","المهاجم","الحارس","المدرب"],correct:0},
{q:"ما اسم اللاعب الذي يلعب بين الدفاع والهجوم؟",a:["لاعب الوسط","الحارس","المدافع","الحكم"],correct:0},
{q:"ما شكل كرة القدم؟",a:["دائري","مربع","مثلث","مستطيل"],correct:0},

{q:"ما لون أرضية ملعب كرة القدم عادة؟",a:["أخضر","أزرق","أحمر","أسود"],correct:0},
{q:"كم حكم مساعد يقف على جانبي الملعب عادة؟",a:["2","3","4","5"],correct:0},
{q:"ماذا يحصل الفريق عندما يسجل هدفاً؟",a:["نقطة واحدة","بطاقة","خطأ","ضربة حرة"],correct:0},
{q:"كم مرمى يدافع عنه كل فريق؟",a:["1","2","3","4"],correct:0},
{q:"كم فريق يلعب في المباراة؟",a:["1","2","3","4"],correct:1},
{q:"كم لاعب في قائمة الفريق عادة في المباريات الدولية؟",a:["23","20","18","15"],correct:0},
{q:"ما اسم المكان الذي تقام فيه مباريات كرة القدم؟",a:["ملعب","صالة","حلبة","مضمار"],correct:0},
{q:"ماذا تسمى المسابقة التي تتكون من عدة فرق؟",a:["دوري","مباراة","جولة","لعبة"],correct:0},
{q:"ماذا تسمى المسابقة التي تعتمد نظام خروج المغلوب؟",a:["بطولة الكأس","الدوري","المباراة","الجولة"],correct:0},
{q:"ما وظيفة الحكم في المباراة؟",a:["إدارة المباراة وتطبيق القوانين","تسجيل الأهداف","حراسة المرمى","تدريب اللاعبين"],correct:0},

{q:"ماذا تسمى عملية تمرير الكرة بين اللاعبين؟",a:["تمريرة","تسديدة","مراوغة","هدف"],correct:0},
{q:"ماذا تسمى محاولة إدخال الكرة في المرمى؟",a:["تسديدة","تمريرة","مراوغة","رمية"],correct:0},
{q:"ماذا تسمى حركة تجاوز اللاعب للخصم بالكرة؟",a:["مراوغة","تمريرة","تسديدة","هدف"],correct:0},
{q:"ماذا يسمى الهدف الذي يسجله اللاعب في مرماه بالخطأ؟",a:["هدف عكسي","ركلة ركنية","ضربة حرة","رمية تماس"],correct:0},
{q:"ماذا يحدث عندما تخرج الكرة من الخط الجانبي؟",a:["رمية تماس","ركلة جزاء","ركلة ركنية","هدف"],correct:0},
{q:"ماذا تسمى الركلة التي ينفذها الحارس عندما تخرج الكرة من خط المرمى؟",a:["ركلة مرمى","ركلة ركنية","رمية تماس","ركلة جزاء"],correct:0},
{q:"ما اسم الخط الذي يقسم الملعب إلى نصفين؟",a:["خط منتصف الملعب","خط المرمى","الخط الجانبي","خط الجزاء"],correct:0},
{q:"ما اسم المنطقة القريبة من المرمى التي يحدث فيها ركلة الجزاء؟",a:["منطقة الجزاء","منطقة الوسط","منطقة الركنية","منطقة التماس"],correct:0},
{q:"ما اسم النقطة التي تنفذ منها ركلة الجزاء؟",a:["نقطة الجزاء","نقطة البداية","نقطة الركنية","نقطة التماس"],correct:0}
];

let currentQuestion=0;
let timeLeft=10;
let timer;

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

shuffle(questions);

function startTimer(){

clearInterval(timer);

timeLeft=10;

document.getElementById("timer").innerText="⏳ الوقت: "+timeLeft;

timer=setInterval(()=>{

timeLeft--;

document.getElementById("timer").innerText="⏳ الوقت: "+timeLeft;

if(timeLeft<=0){
clearInterval(timer);
autoAnswer();
}

},1000);

}

function autoAnswer(){

let q=questions[currentQuestion];

let buttons=document.querySelectorAll("#answers button");

buttons.forEach(b=>b.disabled=true);

buttons[q.correct].style.backgroundColor="#00c853";

document.getElementById("result").innerText="⏰ انتهى الوقت! الإجابة: "+q.a[q.correct];

currentQuestion++;

setTimeout(()=>{

document.getElementById("result").innerText="";

if(currentQuestion<questions.length){
showQuestion();
}else{
document.getElementById("question").innerText="🎉 انتهت الأسئلة!";
document.getElementById("answers").innerHTML="";
document.getElementById("timer").innerText="";
}

},1200);

}

function showQuestion(){

startTimer();

let q=questions[currentQuestion];

shuffleAnswers(q);

document.getElementById("question").innerText=q.q;

let answersDiv=document.getElementById("answers");

answersDiv.innerHTML="";

q.a.forEach((answer,index)=>{

let btn=document.createElement("button");

btn.innerText=answer;

btn.onclick=function(){

clearInterval(timer);

let buttons=document.querySelectorAll("#answers button");

buttons.forEach(b=>b.disabled=true);

if(index===q.correct){

btn.style.backgroundColor="#00c853";

document.getElementById("result").innerText="✅ إجابة صحيحة!";

}else{

btn.style.backgroundColor="#d50000";

buttons[q.correct].style.backgroundColor="#00c853";

document.getElementById("result").innerText="❌ الإجابة الصحيحة: "+q.a[q.correct];

}

currentQuestion++;

setTimeout(()=>{

document.getElementById("result").innerText="";

if(currentQuestion<questions.length){
showQuestion();
}else{
document.getElementById("question").innerText="🎉 انتهت الأسئلة!";
document.getElementById("answers").innerHTML="";
document.getElementById("timer").innerText="";
}

},1200);

};

answersDiv.appendChild(btn);

});

}

function shuffleAnswers(question){

let correctAnswer=question.a[question.correct];

for(let i=question.a.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));

[question.a[i],question.a[j]]=[question.a[j],question.a[i]];

}

question.correct=question.a.indexOf(correctAnswer);

}

showQuestion();

</script>

</body>
</html>
