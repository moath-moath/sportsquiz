<!DOCTYPE html>
<html>
<head>
<title>المستوى المبتدئ</title>

<style>

body{
background-color:#0d1b2a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.container{
width:80%;
max-width:600px;
margin:60px auto;
background-color:#1b263b;
padding:30px;
border-radius:15px;
}

button{
display:block;
width:80%;
margin:12px auto;
padding:14px;
font-size:20px;
font-weight:bold;
border-radius:10px;
border:none;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

#timer{
font-size:22px;
margin:10px;
color:#ffd600;
}

#visitors{
margin-bottom:15px;
color:#90caf9;
}

.home-btn{
background:#ffd600;
color:black;
margin-top:20px;
}

#score{
font-size:24px;
margin-bottom:10px;
color:#00e676;
}

</style>
</head>

<body>

<div class="container">

<h1>المستوى المبتدئ</h1>

<div id="visitors">👥 الزوار الآن: <span id="online">...</span></div>

<h3 id="score">⭐ السكور: 0</h3>

<h2 id="question"></h2>

<div id="answers"></div>

<h3 id="result"></h3>

<div id="timer"></div>

<a href="/"><button class="home-btn">🏠 الرجوع للرئيسية</button></a>

</div>

<script>

let questions=[]
[
{"q":"كم لاعب في فريق كرة القدم؟","a":["9","10","11","12"],"correct":2},
{"q":"كم مدة المباراة؟","a":["80","90","100","120"],"correct":1},
{"q":"لون بطاقة الطرد؟","a":["أصفر","أحمر","أزرق","أخضر"],"correct":1},
{"q":"كم شوط في المباراة؟","a":["1","2","3","4"],"correct":1}
]
let currentQuestion=0
let timeLeft=10
let timer
let score=0

async function loadQuestions(){

let res=await fetch("questions_beginner.json")
questions=await res.json()

startQuiz()

}

function startQuiz(){

shuffle(questions)

showQuestion()

}

function shuffle(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

[array[i],array[j]]=[array[j],array[i]]

}

}

function startTimer(){

clearInterval(timer)

timeLeft=10

document.getElementById("timer").innerText="⏳ الوقت: "+timeLeft

timer=setInterval(()=>{

timeLeft--

document.getElementById("timer").innerText="⏳ الوقت: "+timeLeft

if(timeLeft<=0){

clearInterval(timer)

autoAnswer()

}

},1000)

}

function autoAnswer(){

let q=questions[currentQuestion]

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

buttons[q.correct].style.backgroundColor="#00c853"

document.getElementById("result").innerText="⏰ انتهى الوقت!"

currentQuestion++

setTimeout(nextQuestion,1200)

}

function showQuestion(){

startTimer()

let q=questions[currentQuestion]

document.getElementById("question").innerText=q.q

let answersDiv=document.getElementById("answers")

answersDiv.innerHTML=""

q.a.forEach((answer,index)=>{

let btn=document.createElement("button")

btn.innerText=answer

btn.onclick=function(){

clearInterval(timer)

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

if(index===q.correct){

btn.style.backgroundColor="#00c853"

document.getElementById("result").innerText="✅ إجابة صحيحة"

score++

document.getElementById("score").innerText="⭐ السكور: "+score

}else{

btn.style.backgroundColor="#d50000"

buttons[q.correct].style.backgroundColor="#00c853"

document.getElementById("result").innerText="❌ إجابة خاطئة"

}

currentQuestion++

setTimeout(nextQuestion,1200)

}

answersDiv.appendChild(btn)

})

}

function nextQuestion(){

document.getElementById("result").innerText=""

if(currentQuestion<questions.length){

showQuestion()

}else{

showFinalScore()

}

}

function showFinalScore(){

document.getElementById("question").innerText="🎉 انتهت الأسئلة"

document.getElementById("answers").innerHTML=""

document.getElementById("timer").innerText=""

document.getElementById("score").innerText="⭐ نتيجتك: "+score+" / "+questions.length

}

loadQuestions()

/* زوار عشوائيين (شكل حقيقي) */

setInterval(()=>{

let online=Math.floor(Math.random()*40)+10
document.getElementById("online").innerText=online

},3000)

</script>

</body>
</html>
