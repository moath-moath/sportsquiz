<!DOCTYPE html>
<html lang="ar">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المستوى الصعب</title>

<style>

body{
background:#0d1b2a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.container{
width:90%;
max-width:650px;
margin:60px auto;

padding:30px;
border-radius:15px;
}

button{
display:block;
width:85%;

padding:15px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:10px;
cursor:pointer;

}

}

}

}

.correct{
background:#00c853 !important;
}

.wrong{
background:#d50000 !important;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 المستوى الصعب</h1>

<button onclick="openAdmin()">⚙ لوحة المدير</button>

<div id="adminPanel">

<h3>📊 لوحة المدير</h3>

<div>👥 المستخدمون النشطون: <span id="onlineUsers">15</span></div>

</div>

<script>

let score = 0
let currentQuestion = 0
let time = 8

let questions=[
    
{q:"من سجل الهدف الذهبي في نهائي كأس العالم 2010؟",a:["إنييستا","تشافي","فيا","توريس"],correct:0},
{q:"من هو أول لاعب يفوز بالكرة الذهبية 3 مرات متتالية؟",a:["ميشيل بلاتيني","يوهان كرويف","ماركو فان باستن","ألفريدو دي ستيفانو"],correct:0},

{q:"أي لاعب سجل أكثر أهداف في نسخة واحدة من كأس العالم؟",a:["جوست فونتين","بيليه","رونالدو","كلوزه"],correct:0},
{q:"كم هدف سجل جوست فونتين في كأس العالم 1958؟",a:["13","11","10","12"],correct:0},
{q:"من هو أصغر لاعب سجل في نهائي كأس العالم؟",a:["بيليه","مبابي","رونالدو","ميسي"],correct:0},
{q:"أي منتخب فاز بكأس العالم دون خسارة أي مباراة عام 1970؟",a:["البرازيل","ألمانيا","إيطاليا","الأرجنتين"],correct:0},
{q:"من سجل هدف الأرجنتين الثاني في نهائي كأس العالم 1986؟",a:["خورخي فالدانو","مارادونا","بوروتشاغا","باتيستا"],correct:0},

{q:"أي لاعب سجل هدفين في نهائي دوري الأبطال 2017؟",a:["كريستيانو رونالدو","بنزيما","إيسكو","بيل"],correct:0},
{q:"أي نادي إنجليزي فاز بالثلاثية التاريخية 1999؟",a:["مانشستر يونايتد","ليفربول","أرسنال","تشيلسي"],correct:0},
{q:"أي لاعب سجل هدف دوري الأبطال الشهير بالكعب مع ريال مدريد 2012؟",a:["كريم بنزيما","رونالدو","أوزيل","دي ماريا"],correct:0},
{q:"أي نادي فاز بدوري الأبطال 2004 بشكل مفاجئ؟",a:["بورتو","ميلان","تشيلسي","ريال مدريد"],correct:0},
{q:"من كان مدرب بورتو في دوري الأبطال 2004؟",a:["جوزيه مورينيو","غوارديولا","أنشيلوتي","كلوب"],correct:0},

{q:"أي لاعب سجل هدف برشلونة الشهير ضد تشيلسي 2009 في الدقيقة 93؟",a:["إنييستا","ميسي","إيتو","تشافي"],correct:0},
{q:"أي نادي خسر نهائي دوري الأبطال 3 مرات متتالية في السبعينات؟",a:["يوفنتوس","أياكس","بايرن","ليفربول"],correct:0},
{q:"أي لاعب سجل هدف ليفربول الأول في نهائي دوري الأبطال 2005؟",a:["ستيفن جيرارد","ألونسو","سيسيه","سميشر"],correct:0},
{q:"من سجل هدف فوز برشلونة في نهائي دوري الأبطال 2015؟",a:["نيمار","ميسي","سواريز","راكيتيتش"],correct:0},
{q:"أي فريق هزم برشلونة 8-2 في دوري الأبطال 2020؟",a:["بايرن ميونخ","ريال مدريد","ليفربول","مانشستر سيتي"],correct:0},

{q:"من هو هداف كأس العالم 2002؟",a:["رونالدو البرازيلي","كلوزه","ريفالدو","رونالدينيو"],correct:0},
{q:"أي منتخب أخرج البرازيل من كأس العالم 2010؟",a:["هولندا","ألمانيا","الأرجنتين","إسبانيا"],correct:0},
{q:"من سجل هدف فوز ألمانيا في نهائي كأس العالم 2014؟",a:["ماريو غوتزه","مولر","كلوزه","أوزيل"],correct:0},
{q:"أي لاعب سجل هاتريك في نهائي كأس العالم 2022؟",a:["كيليان مبابي","ميسي","دي ماريا","جيرو"],correct:0},
{q:"أي منتخب هزم البرازيل 7-1 في كأس العالم 2014؟",a:["ألمانيا","الأرجنتين","هولندا","فرنسا"],correct:0},

{q:"من سجل الهدف الأول في نهائي كأس العالم 2022؟",a:["ليونيل ميسي","دي ماريا","مبابي","ألفاريز"],correct:0},
{q:"أي لاعب سجل هدف الأرجنتين الثاني في نهائي 2022؟",a:["دي ماريا","ميسي","مارتينيز","ألفاريز"],correct:0},
{q:"أي منتخب فاز بأول كأس عالم في التاريخ؟",a:["الأوروغواي","البرازيل","الأرجنتين","إيطاليا"],correct:0},
{q:"في أي عام فازت إنجلترا بكأس العالم؟",a:["1966","1970","1958","1982"],correct:0},
{q:"من سجل هدف إنجلترا الشهير في نهائي 1966؟",a:["جيف هيرست","بوبي تشارلتون","بيترز","هانت"],correct:0},

{q:"أي لاعب سجل أكثر أهداف في تاريخ دوري الأبطال؟",a:["كريستيانو رونالدو","ميسي","ليفاندوفسكي","بنزيما"],correct:0},
{q:"أي نادي فاز بأول دوري أبطال أوروبا؟",a:["ريال مدريد","ميلان","أياكس","ليفربول"],correct:0},
{q:"في أي سنة تأسس نادي برشلونة؟",a:["1899","1902","1888","1910"],correct:0},
{q:"في أي سنة تأسس ريال مدريد؟",a:["1902","1899","1910","1920"],correct:0},
{q:"من أسس نادي برشلونة؟",a:["خوان غامبر","لابورتا","كرويف","نيمار"],correct:0},

{q:"أي لاعب سجل الهدف الأغلى في تاريخ ريال مدريد نهائي 2014؟",a:["سيرجيو راموس","بيل","رونالدو","مودريتش"],correct:0},
{q:"في أي دقيقة سجل راموس هدف نهائي 2014؟",a:["93","90","91","94"],correct:0},
{q:"أي لاعب سجل مقصية شهيرة ضد يوفنتوس 2018؟",a:["كريستيانو رونالدو","بيل","بنزيما","إيسكو"],correct:0},
{q:"أي لاعب سجل مقصية نهائي دوري الأبطال 2018؟",a:["غاريث بيل","رونالدو","بنزيما","إيسكو"],correct:0},
{q:"أي منتخب فاز بكأس العالم 1954؟",a:["ألمانيا الغربية","المجر","إيطاليا","البرازيل"],correct:0},

{q:"أي منتخب فاز بكأس العالم 1938؟",a:["إيطاليا","البرازيل","ألمانيا","الأرجنتين"],correct:0},
{q:"أي لاعب سجل هدف فرنسا الذهبي في يورو 2000؟",a:["تريزيغيه","زيدان","هنري","فييرا"],correct:0},
{q:"أي لاعب سجل هدف إسبانيا في نهائي يورو 2012؟",a:["ديفيد سيلفا","تشافي","إنييستا","توريس"],correct:0},
{q:"أي منتخب فاز بيورو 2004؟",a:["اليونان","البرتغال","إسبانيا","فرنسا"],correct:0},
{q:"من كان مدرب اليونان في يورو 2004؟",a:["أوتو ريهاجل","فرغسون","أنشيلوتي","كلوب"],correct:0},
{q:"أي لاعب سجل هدف ليفربول الشهير ضد برشلونة 2019 من ركنية سريعة؟",a:["أوريغي","صلاح","ماني","فيرمينو"],correct:0},
{q:"أي لاعب سجل هدف برشلونة ضد باريس 2017 في الريمونتادا؟",a:["سيرجي روبرتو","ميسي","سواريز","نيمار"],correct:0},
{q:"أي فريق فاز بدوري الأبطال 2012؟",a:["تشيلسي","بايرن ميونخ","ريال مدريد","برشلونة"],correct:0},
{q:"من سجل هدف تشيلسي في نهائي 2012؟",a:["ديدييه دروغبا","لامبارد","توريس","ماتا"],correct:0},
{q:"أي لاعب سجل هدف فوز فرنسا بنهائي كأس العالم 1998 الأول؟",a:["زيدان","هنري","ديشامب","بلان"],correct:0},
]

function shuffle(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

let temp=array[i]
array[i]=array[j]
array[j]=temp

}

}

shuffle(questions)

function startTimer(){

clearInterval(timer)

time=8

document.getElementById("timer").innerText="⏳ الوقت: "+time

timer=setInterval(function(){

time--

document.getElementById("timer").innerText="⏳ الوقت: "+time

if(time<=0){

clearInterval(timer)
autoAnswer()

}

},1000)

}

function autoAnswer(){

let q=questions[currentQuestion]

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(function(b){

b.disabled=true

})

if(buttons[q.correct]){
buttons[q.correct].classList.add("correct")
}

document.getElementById("result").innerText=
"⏰ انتهى الوقت! الإجابة الصحيحة: "+q.a[q.correct]

setTimeout(nextQuestion,1500)

}

function showQuestion(){

if(currentQuestion>=questions.length){

endGame()
return

}
let q=questions[currentQuestion]

startTimer()



document.getElementById("question").innerText=q.q

let answersDiv=document.getElementById("answers")

answersDiv.innerHTML=""

q.a.forEach(function(answer,index){

let btn=document.createElement("button")

btn.innerText=answer

btn.onclick=function(){

clearInterval(timer)

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(function(b){

b.disabled=true

})

if(index===q.correct){

score++

document.getElementById("score").innerText="⭐ السكور: "+score

btn.classList.add("correct")

document.getElementById("result").innerText="✅ إجابة صحيحة"

}else{

btn.classList.add("wrong")

if(buttons[q.correct]){
buttons[q.correct].classList.add("correct")
}

document.getElementById("result").innerText=
"❌ الإجابة الصحيحة: "+q.a[q.correct]

}

setTimeout(nextQuestion,1200)

}

answersDiv.appendChild(btn)

})

}

function nextQuestion(){

currentQuestion++

document.getElementById("result").innerText=""

showQuestion()

}

function endGame(){

clearInterval(timer)

document.getElementById("question").innerText="🎉 انتهت الأسئلة"

document.getElementById("answers").innerHTML=""

document.getElementById("timer").innerText=""

document.getElementById("result").innerHTML=

"⭐ نتيجتك: "+score+" / "+questions.length+

"<br><br><button onclick='restartGame()'>🔄 إعادة اللعب</button>"

}

function restartGame(){

clearInterval(timer)

score=0
currentQuestion=0
time=8

document.getElementById("score").innerText="⭐ السكور: 0"
document.getElementById("result").innerText=""

shuffle(questions)

showQuestion()

}

showQuestion()

function openAdmin(){

let adminPassword="1234"

let pass=prompt("ادخل كلمة مرور المدير")

if(pass===adminPassword){

document.getElementById("adminPanel").style.display="block"

}else{

alert("❌ كلمة المرور خاطئة")

}

}

setInterval(function(){

let online=Math.floor(Math.random()*40)+10

document.getElementById("onlineUsers").innerText=online

},4000)

</script>

</body>
</html>
