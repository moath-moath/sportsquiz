<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المستوى الصعب</title>

<style>

body{
background:#0d1b2a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.container{
width:90%;
max-width:650px;
margin:60px auto;
background:#1b263b;
padding:30px;
border-radius:15px;
}

button{
display:block;
width:85%;
margin:12px auto;
padding:15px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:10px;
cursor:pointer;
background:#415a77;
color:white;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

#timer{
font-size:24px;
color:#ffd60a;
margin-bottom:10px;
}

#score{
font-size:22px;
color:#00e5ff;
margin-bottom:15px;
}

#adminPanel{
background:#0f2027;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.correct{
background:#00c853 !important;
}

.wrong{
background:#d50000 !important;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 المستوى الصعب</h1>

<button onclick="openAdmin()">⚙ لوحة المدير</button>

<div id="adminPanel" style="display:none">

<h3>📊 لوحة المدير</h3>

<div>👥 المستخدمون النشطون: <span id="onlineUsers">15</span></div>

<div>📈 إجمالي الزوار: <span id="totalVisitors">1200</span></div>

</div>

<div id="score">⭐ السكور: 0</div>

<div id="timer"></div>

<h2 id="question"></h2>

<div id="answers"></div>

<div id="result"></div>

<a href="/"><button>🏠 الرجوع للرئيسية</button></a>

</div>

<script>

let score=0
let currentQuestion=0
let time=8
let timer

let questions=[

{q:"من سجل أول هدف في تاريخ كأس العالم؟",a:["بيليه","لوسيان لوران","جاست فونتين","سيفوري"],correct:1},
{q:"أي منتخب فاز بكأس العالم 1954؟",a:["ألمانيا الغربية","المجر","البرازيل","إيطاليا"],correct:0},
{q:"من هداف كأس العالم 1958؟",a:["بيليه","جاست فونتين","غارينشيا","فافا"],correct:1},
{q:"كم هدف سجل جاست فونتين في كأس العالم 1958؟",a:["11","13","15","17"],correct:1},
{q:"أي منتخب فاز بكأس العالم 1938؟",a:["إيطاليا","البرازيل","الأرجنتين","المجر"],correct:0},

{q:"من سجل هدف فوز إنجلترا في نهائي كأس العالم 1966؟",a:["بوبي تشارلتون","جيف هيرست","بوبي مور","روجر هانت"],correct:1},
{q:"كم هدف سجل جيف هيرست في نهائي 1966؟",a:["2","3","4","1"],correct:1},
{q:"أي منتخب خسر نهائي كأس العالم 1950؟",a:["البرازيل","الأوروغواي","السويد","إسبانيا"],correct:0},
{q:"من فاز بكأس العالم 1950؟",a:["الأوروغواي","البرازيل","إيطاليا","الأرجنتين"],correct:0},
{q:"أين أقيم أول كأس عالم؟",a:["الأرجنتين","البرازيل","الأوروغواي","فرنسا"],correct:2},

{q:"من اللاعب الذي سجل هدف 'يد الله'؟",a:["مارادونا","بيليه","زين الدين زيدان","باتيستوتا"],correct:0},
{q:"ضد أي منتخب سجل مارادونا هدف القرن 1986؟",a:["ألمانيا","إيطاليا","إنجلترا","البرازيل"],correct:2},
{q:"أي منتخب أقصى البرازيل 7-1 في مونديال 2014؟",a:["ألمانيا","الأرجنتين","هولندا","إسبانيا"],correct:0},
{q:"من سجل أول هدف في مباراة 7-1 الشهيرة؟",a:["مولر","كلوزه","كروس","أوزيل"],correct:0},
{q:"من أصبح الهداف التاريخي لكأس العالم 2014؟",a:["كلوزه","رونالدو","مولر","كافاني"],correct:0},

{q:"كم هدف سجل ميروسلاف كلوزه في كأس العالم؟",a:["14","15","16","17"],correct:2},
{q:"من سجل هدف فوز فرنسا في نهائي يورو 2000؟",a:["زيدان","تريزيغيه","هنري","بلان"],correct:1},
{q:"من سجل الهدف الذهبي لفرنسا في نصف نهائي 1998؟",a:["زيدان","بلان","ديشامب","تريزيغيه"],correct:1},
{q:"أي منتخب فاز بيورو 2004؟",a:["البرتغال","اليونان","إيطاليا","فرنسا"],correct:1},
{q:"من سجل هدف نهائي يورو 2004؟",a:["خاريستياس","فيغو","رونالدو","ديكو"],correct:0},

{q:"أي فريق خسر نهائي دوري الأبطال 2005 بعد تقدمه 3-0؟",a:["ميلان","ليفربول","يوفنتوس","برشلونة"],correct:0},
{q:"من سجل هدف التعادل الثالث لليفربول في نهائي 2005؟",a:["جيرارد","ألونسو","سيسيه","كيويل"],correct:1},
{q:"من سجل أول هدف في نهائي دوري الأبطال 1999؟",a:["شيرينغهام","باسلر","سولشاير","كول"],correct:1},
{q:"أي فريق خسر نهائي 1999 ضد مانشستر يونايتد؟",a:["بايرن ميونخ","يوفنتوس","ريال مدريد","برشلونة"],correct:0},
{q:"من سجل هدف الفوز لمانشستر يونايتد 1999؟",a:["كول","سولشاير","جيجز","بيكهام"],correct:1},

{q:"من فاز بدوري الأبطال 1992 (الأول بالنظام الجديد)؟",a:["برشلونة","ميلان","مارسيليا","ريال مدريد"],correct:0},
{q:"من سجل هدف نهائي دوري الأبطال 1992؟",a:["كومان","روماريو","ستويشكوف","بيغريستين"],correct:0},
{q:"أي فريق فاز بدوري الأبطال 1993؟",a:["ميلان","مارسيليا","برشلونة","أياكس"],correct:1},
{q:"ضد من فاز مارسيليا بنهائي 1993؟",a:["ميلان","برشلونة","ريال مدريد","بنفيكا"],correct:0},
{q:"من سجل هدف نهائي 1993؟",a:["بولي","بابان","ديشان","ديسايي"],correct:0},

{q:"من أكثر لاعب مشاركة في تاريخ دوري الأبطال؟",a:["كاسياس","رونالدو","ميسي","راموس"],correct:0},
{q:"من أكثر لاعب تسجيلاً في تاريخ دوري الأبطال؟",a:["ميسي","رونالدو","ليفاندوفسكي","راؤول"],correct:1},
{q:"من أكثر فريق فاز بدوري الأبطال؟",a:["ميلان","بايرن","ريال مدريد","ليفربول"],correct:2},
{q:"كم لقب دوري أبطال أوروبا لميلان؟",a:["5","6","7","8"],correct:2},
{q:"كم لقب دوري أبطال أوروبا لليفربول؟",a:["5","6","7","8"],correct:1},

{q:"أي لاعب سجل في نهائيات دوري الأبطال مع 3 أندية مختلفة؟",a:["إيتو","رونالدو","سيدورف","إبراهيموفيتش"],correct:0},
{q:"أي لاعب فاز بدوري الأبطال مع 3 أندية مختلفة؟",a:["سيدورف","راؤول","لام","إنييستا"],correct:0},
{q:"أي مدرب فاز بدوري الأبطال مع ريال مدريد 3 مرات متتالية؟",a:["مورينيو","زيدان","أنشيلوتي","ديل بوسكي"],correct:1},
{q:"من فاز بكأس العالم كمدرب ولاعب مع ألمانيا؟",a:["لوف","بيكنباور","كلينسمان","مولر"],correct:1},
{q:"من المدرب الذي قاد اليونان للفوز بيورو 2004؟",a:["ريكارد","أوتو ريهاجل","سكولاري","لوف"],correct:1},

{q:"أي لاعب سجل أسرع هدف في تاريخ كأس العالم؟",a:["هاكان شوكور","رونالدو","مولر","راؤول"],correct:0},
{q:"كم ثانية استغرق هدف هاكان شوكور؟",a:["10","11","12","13"],correct:1},
{q:"من هداف كأس العالم 1994؟",a:["روماريو","باجيو","ستوخكوف","ساليناس"],correct:2},
{q:"من هداف كأس العالم 2006؟",a:["كلوزه","رونالدو","هنري","توني"],correct:0},
{q:"من هداف كأس العالم 2010؟",a:["مولر","فيلا","شنايدر","فورلان"],correct:0},

{q:"أي منتخب فاز بكأس أمم أوروبا 1992؟",a:["ألمانيا","السويد","الدنمارك","هولندا"],correct:2},
{q:"أي منتخب فاز بكأس أمم أوروبا 1988؟",a:["هولندا","ألمانيا","إيطاليا","فرنسا"],correct:0},
{q:"من سجل هدف نهائي يورو 1988؟",a:["فان باستن","رود خوليت","ريكارد","كومان"],correct:0}

]

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
[array[i],array[j]]=[array[j],array[i]]
}
}

shuffle(questions)

function startTimer(){

clearInterval(timer)

time=8

document.getElementById("timer").innerText="⏳ الوقت: "+time

timer=setInterval(()=>{

time--

document.getElementById("timer").innerText="⏳ الوقت: "+time

if(time<=0){

clearInterval(timer)
autoAnswer()

}

},1000)

}

function autoAnswer(){

let q=questions[currentQuestion]

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

if(buttons[q.correct]){
buttons[q.correct].classList.add("correct")
}

document.getElementById("result").innerText=
"⏰ انتهى الوقت! الإجابة الصحيحة: "+q.a[q.correct]

setTimeout(nextQuestion,1500)

}

function showQuestion(){

if(currentQuestion>=questions.length){
endGame()
return
}

startTimer()

let q=questions[currentQuestion]

document.getElementById("question").innerText=q.q

let answersDiv=document.getElementById("answers")

answersDiv.innerHTML=""

q.a.forEach((answer,index)=>{

let btn=document.createElement("button")

btn.innerText=answer

btn.onclick=function(){

clearInterval(timer)

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

if(index===q.correct){

score++

document.getElementById("score").innerText="⭐ السكور: "+score

btn.classList.add("correct")

document.getElementById("result").innerText="✅ إجابة صحيحة"

}else{

btn.classList.add("wrong")

if(buttons[q.correct]){
buttons[q.correct].classList.add("correct")
}

document.getElementById("result").innerText=
"❌ الإجابة الصحيحة: "+q.a[q.correct]

}

setTimeout(nextQuestion,1200)

}

answersDiv.appendChild(btn)

})

}

function nextQuestion(){

currentQuestion++

document.getElementById("result").innerText=""

showQuestion()

}

function endGame(){

clearInterval(timer)

document.getElementById("question").innerText="🎉 انتهت الأسئلة"

document.getElementById("answers").innerHTML=""

document.getElementById("timer").innerText=""

document.getElementById("result").innerHTML=

"⭐ نتيجتك: "+score+" / "+questions.length+

"<br><br><button onclick='restartGame()'>🔄 إعادة اللعب</button>"
}

function restartGame(){

clearInterval(timer)

score=0
currentQuestion=0
time=8

document.getElementById("score").innerText="⭐ السكور: 0"
document.getElementById("result").innerText=""

shuffle(questions)

showQuestion()

}

showQuestion()

function openAdmin(){

let adminPassword="1234"

let pass=prompt("ادخل كلمة مرور المدير")

if(pass===adminPassword){

document.getElementById("adminPanel").style.display="block"

}else{

alert("❌ كلمة المرور خاطئة")

}

}

</script>

</body>
</html>
