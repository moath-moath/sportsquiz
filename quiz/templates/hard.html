<!DOCTYPE html>
<html lang="ar">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المستوى الصعب</title>

<style>

body{
background:#0d1b2a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.container{
width:90%;
max-width:650px;
margin:60px auto;
background:#1b263b;
padding:30px;
border-radius:15px;
}

button{
display:block;
width:85%;
margin:12px auto;
padding:15px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:10px;
cursor:pointer;
background:#415a77;
color:white;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

#timer{
font-size:24px;
color:#ffd60a;
margin-bottom:10px;
}

#score{
font-size:22px;
color:#00e5ff;
margin-bottom:15px;
}

#adminPanel{
background:#0f2027;
padding:15px;
border-radius:10px;
margin-bottom:20px;
display:none;
}

.correct{
background:#00c853 !important;
}

.wrong{
background:#d50000 !important;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 المستوى الصعب</h1>

<button onclick="openAdmin()">⚙ لوحة المدير</button>

<div id="adminPanel">

<h3>📊 لوحة المدير</h3>

<div>👥 المستخدمون النشطون: <span id="onlineUsers">15</span></div>

<div>📈 إجمالي الزوار: <span id="totalVisitors">1200</span></div>

</div>

<div id="score">⭐ السكور: 0</div>

<div id="timer"></div>

<h2 id="question"></h2>

<div id="answers"></div>

<div id="result"></div>

<a href="/"><button>🏠 الرجوع للرئيسية</button></a>

</div>

<script>

let score = 0
let currentQuestion = 0
let time = 8
let timer = null

let questions=[

{q:"من سجل أول هدف في تاريخ كأس العالم؟",a:["بيليه","لوسيان لوران","جاست فونتين","سيفوري"],correct:1},
{q:"أي منتخب فاز بكأس العالم 1954؟",a:["ألمانيا الغربية","المجر","البرازيل","إيطاليا"],correct:0},
{q:"من هداف كأس العالم 1958؟",a:["بيليه","جاست فونتين","غارينشيا","فافا"],correct:1},
{q:"كم هدف سجل جاست فونتين في كأس العالم 1958؟",a:["11","13","15","17"],correct:1},
{q:"أي منتخب فاز بكأس العالم 1938؟",a:["إيطاليا","البرازيل","الأرجنتين","المجر"],correct:0}

]

function shuffle(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

let temp=array[i]
array[i]=array[j]
array[j]=temp

}

}

shuffle(questions)

function startTimer(){

clearInterval(timer)

time=8

document.getElementById("timer").innerText="⏳ الوقت: "+time

timer=setInterval(function(){

time--

document.getElementById("timer").innerText="⏳ الوقت: "+time

if(time<=0){

clearInterval(timer)
autoAnswer()

}

},1000)

}

function autoAnswer(){

let q=questions[currentQuestion]

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(function(b){

b.disabled=true

})

if(buttons[q.correct]){
buttons[q.correct].classList.add("correct")
}

document.getElementById("result").innerText=
"⏰ انتهى الوقت! الإجابة الصحيحة: "+q.a[q.correct]

setTimeout(nextQuestion,1500)

}

function showQuestion(){

if(currentQuestion>=questions.length){

endGame()
return

}
let q=questions[currentQuestion]

startTimer()



document.getElementById("question").innerText=q.q

let answersDiv=document.getElementById("answers")

answersDiv.innerHTML=""

q.a.forEach(function(answer,index){

let btn=document.createElement("button")

btn.innerText=answer

btn.onclick=function(){

clearInterval(timer)

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(function(b){

b.disabled=true

})

if(index===q.correct){

score++

document.getElementById("score").innerText="⭐ السكور: "+score

btn.classList.add("correct")

document.getElementById("result").innerText="✅ إجابة صحيحة"

}else{

btn.classList.add("wrong")

if(buttons[q.correct]){
buttons[q.correct].classList.add("correct")
}

document.getElementById("result").innerText=
"❌ الإجابة الصحيحة: "+q.a[q.correct]

}

setTimeout(nextQuestion,1200)

}

answersDiv.appendChild(btn)

})

}

function nextQuestion(){

currentQuestion++

document.getElementById("result").innerText=""

showQuestion()

}

function endGame(){

clearInterval(timer)

document.getElementById("question").innerText="🎉 انتهت الأسئلة"

document.getElementById("answers").innerHTML=""

document.getElementById("timer").innerText=""

document.getElementById("result").innerHTML=

"⭐ نتيجتك: "+score+" / "+questions.length+

"<br><br><button onclick='restartGame()'>🔄 إعادة اللعب</button>"

}

function restartGame(){

clearInterval(timer)

score=0
currentQuestion=0
time=8

document.getElementById("score").innerText="⭐ السكور: 0"
document.getElementById("result").innerText=""

shuffle(questions)

showQuestion()

}

showQuestion()

function openAdmin(){

let adminPassword="1234"

let pass=prompt("ادخل كلمة مرور المدير")

if(pass===adminPassword){

document.getElementById("adminPanel").style.display="block"

}else{

alert("❌ كلمة المرور خاطئة")

}

}

setInterval(function(){

let online=Math.floor(Math.random()*40)+10

document.getElementById("onlineUsers").innerText=online

},4000)

</script>

</body>
</html>
