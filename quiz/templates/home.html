<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Sports Quiz</title>

<style>

body{
margin:0;
font-family:Tahoma;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* الصندوق الرئيسي */

.container{
background:rgba(0,0,0,0.4);
padding:40px;
border-radius:15px;
width:420px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

/* العنوان */

h1{
font-size:42px;
margin-bottom:10px;
}

.subtitle{
font-size:18px;
margin-bottom:30px;
opacity:0.9;
}

/* الأزرار */

.level-btn{
display:block;
width:260px;
margin:12px auto;
padding:14px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:linear-gradient(45deg,gold,orange);
color:black;
font-weight:bold;
transition:0.3s;
}

.level-btn:hover{
transform:scale(1.1);
box-shadow:0 0 20px gold;
}

/* نافذة الملاحظة */

#notice-box{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.notice{
background:white;
color:black;
padding:35px;
border-radius:12px;
width:420px;
box-shadow:0 0 20px black;
}

.notice h2{
margin-top:0;
}

.skip-btn{
margin-top:20px;
padding:10px 25px;
border:none;
background:#007BFF;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

.skip-btn:hover{
background:#0056b3;
}

</style>
</head>

<body>

<div class="container">

<h1>🏆 Sports Quiz</h1>

<div class="subtitle">اختبر معلوماتك الرياضية</div>

<a href="/beginner/"><button class="level-btn">المستوى المبتدئ</button></a>

<a href="/amateur/"><button class="level-btn">المستوى الهاوي</button></a>

<a href="/medium/"><button class="level-btn">المستوى المتوسط</button></a>

<a href="/hard/"><button class="level-btn">المستوى الصعب</button></a>

<a href="/legendary/"><button class="level-btn">المستوى الأسطوري</button></a>

</div>


<!-- نافذة الملاحظة -->

<div id="notice-box">

<div class="notice">

<h2>⚠ ملاحظة</h2>

<p style="line-height:1.8">

هذا الموقع نسخة تجريبية من مشروع <b>Sports Quiz</b>.<br><br>

قد تواجه بعض الأخطاء أو الميزات غير المكتملة أثناء الاستخدام.<br><br>

نعمل حالياً على تطوير الموقع وتحسينه باستمرار.<br><br>

شكراً لتجربتك ودعمك ❤️

</p>

<button class="skip-btn" onclick="skipNotice()">تخطي</button>

</div>

</div>


<script>

function skipNotice(){
document.getElementById("notice-box").style.display="none";
}

</script>

</body>
</html>
