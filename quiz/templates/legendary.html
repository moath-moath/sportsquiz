<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<title>👑 المستوى الأسطوري</title>

<style>

body{
background:#0d1b2a;
font-family:Arial;

}

.container{

}

button{

padding:14px;

font-weight:bold;

}

}

}

#score{

}

#adminPanel{

padding:15px;
border-radius:10px;

}

.correct{
background:#00c853 !important;
}

.wrong{

}

</style>
</head>

<body>

<div class="container">

<h1>👑 المستوى الأسطوري</h1>

<button onclick="openAdmin()">⚙ لوحة المدير</button>

<div id="adminPanel" style="display:none">

<h3>📊 لوحة المدير</h3>

<div>👥 المستخدمون النشطون: <span id="onlineUsers">15</span></div>

<div>📈 إجمالي الزوار: <span id="totalVisitors">1200</span></div>

</div>

<h3 id="result"></h3>

<a href="/"><button>🏠 الرجوع للرئيسية</button></a>

</div>

<script>

let score=0

let timer

let questions=[

{q:"من هو أول لاعب سجل هدفاً في تاريخ كأس العالم عام 1930؟",a:["لوسيان لوران","بيليه","غيرد مولر","جوزيف أورسيني"],correct:0},
{q:"أي منتخب خسر نهائي كأس العالم 3 مرات متتالية؟",a:["البرازيل","هولندا","ألمانيا","الأرجنتين"],correct:1},

{q:"من اللاعب الذي سجل هدف إنجلترا الوحيد في نهائي كأس العالم 1966؟",a:["جيف هيرست","بوبي تشارلتون","غوردون بانكس","بيتر بونتي"],correct:0},
{q:"من هو أول لاعب أفريقي يفوز بدوري أبطال أوروبا؟",a:["رابح ماجر","صامويل إيتو","ديدييه دروغبا","جورج وياه"],correct:0},
{q:"أي فريق فاز بدوري أبطال أوروبا عام 1991؟",a:["برشلونة","ميلان","النجم الأحمر بلغراد","بنفيكا"],correct:2},
{q:"من هو اللاعب الذي سجل 5 أهداف في 9 دقائق بالدوري الألماني؟",a:["ليفاندوفسكي","مولر","رويس","كلوزه"],correct:0},

{q:"أي نادي فاز بأول نسخة من دوري أبطال أوروبا 1956؟",a:["ريال مدريد","ميلان","برشلونة","بنفيكا"],correct:0},
{q:"من هو اللاعب الذي سجل هاتريك في نهائي كأس العالم؟",a:["جيف هيرست","بيليه","رونالدو","ميسي"],correct:0},
{q:"أي دولة استضافت كأس العالم 1934؟",a:["إيطاليا","فرنسا","ألمانيا","البرازيل"],correct:0},
{q:"من هو أكثر لاعب مشاركة في كأس العالم؟",a:["ميسي","لوثار ماتيوس","مالديني","رونالدو"],correct:1},
{q:"من سجل هدف يد الله الشهير؟",a:["مارادونا","بيليه","ميسي","روماريو"],correct:0},
{q:"أي نادي إنجليزي فاز بدوري الأبطال عام 1982؟",a:["ليفربول","أستون فيلا","تشيلسي","مانشستر يونايتد"],correct:1},
{q:"من هو أول لاعب عربي يسجل في كأس العالم؟",a:["عبد الرحمن فوزي","ماجد عبدالله","رابح ماجر","حسن شحاتة"],correct:0},
{q:"أي منتخب فاز بكأس العالم دون أن يخسر مباراة في 2010؟",a:["إسبانيا","هولندا","ألمانيا","البرازيل"],correct:0},
{q:"من اللاعب الذي سجل هدف الفوز في نهائي يورو 2004؟",a:["شارستياس","فيغو","رونالدو","ديل بييرو"],correct:0},
{q:"أي منتخب خسر نهائي كأس العالم 1954؟",a:["المجر","ألمانيا","البرازيل","السويد"],correct:0},

{q:"من هو الحارس الذي فاز بالكرة الذهبية؟",a:["ليف ياشين","بوفون","كاسياس","نوير"],correct:0},
{q:"أي نادي فاز بدوري الأبطال 7 مرات قبل عام 2010؟",a:["ميلان","ريال مدريد","ليفربول","بايرن"],correct:0},
{q:"كم هدف سجل ميروسلاف كلوزه في كأس العالم؟",a:["16","15","14","13"],correct:0},
{q:"من اللاعب الذي سجل هدف فوز ألمانيا بكأس العالم 2014؟",a:["غوتزه","مولر","أوزيل","كروس"],correct:0},
{q:"أي منتخب فاز بكأس العالم 1958؟",a:["البرازيل","السويد","ألمانيا","إيطاليا"],correct:0},
{q:"من كان مدرب برشلونة في السداسية 2009؟",a:["غوارديولا","مورينيو","لويس إنريكي","رايكارد"],correct:0},
{q:"أي لاعب سجل هدف الفوز في نهائي دوري الأبطال 1999؟",a:["سولشاير","جيجز","بيكهام","سكولز"],correct:0},
{q:"من هو الهداف التاريخي للمنتخب الألماني؟",a:["كلوزه","مولر","بودولسكي","غوميز"],correct:0},
{q:"أي منتخب فاز بكأس آسيا 2007؟",a:["العراق","السعودية","اليابان","كوريا"],correct:0},
{q:"من هو اللاعب الذي سجل هدف القرن في كأس العالم؟",a:["مارادونا","بيليه","رونالدو","ميسي"],correct:0},

{q:"أي نادي فاز بدوري الأبطال 1997؟",a:["بوروسيا دورتموند","يوفنتوس","ريال مدريد","ميلان"],correct:0},
{q:"من اللاعب الذي سجل هدف فوز فرنسا بكأس العالم 1998 النهائي الثاني؟",a:["زيدان","هنري","تريزيغيه","ديشان"],correct:0},
{q:"أي منتخب فاز بكأس العالم 1978؟",a:["الأرجنتين","البرازيل","هولندا","ألمانيا"],correct:0},
{q:"من سجل هدف فوز إسبانيا في يورو 2008 النهائي؟",a:["توريس","فيلا","إنييستا","تشافي"],correct:0},
{q:"أي فريق فاز بدوري الأبطال 2004؟",a:["بورتو","ميلان","تشيلسي","مانشستر"],correct:0},
{q:"من اللاعب الذي سجل 13 هدفاً في كأس العالم؟",a:["جاست فونتين","بيليه","مولر","كلوزه"],correct:0},
{q:"أي منتخب فاز بكأس العالم 1974؟",a:["ألمانيا الغربية","هولندا","البرازيل","الأرجنتين"],correct:0},
{q:"من سجل هدف فوز مانشستر يونايتد بدوري الأبطال 2008؟",a:["فان دير سار","رونالدو","تيري","أنيلكا"],correct:1},
{q:"أي منتخب فاز بكأس العالم 1950؟",a:["الأوروغواي","البرازيل","إيطاليا","الأرجنتين"],correct:0},
{q:"من اللاعب الذي سجل هدف فوز إيطاليا بنهائي 2006؟",a:["ماتيراتزي","بيرلو","توتي","لم يسجل أحد"],correct:3},

{q:"أي منتخب فاز بكأس أمم أوروبا 2016؟",a:["البرتغال","فرنسا","ألمانيا","إسبانيا"],correct:0},
{q:"من سجل هدف فوز البرتغال في نهائي يورو 2016؟",a:["إيدر","رونالدو","بيبي","ناني"],correct:0},
{q:"أي نادي فاز بدوري الأبطال 2012؟",a:["تشيلسي","بايرن","ريال مدريد","برشلونة"],correct:0},
{q:"من اللاعب الذي سجل هدف فوز برشلونة بنهائي 2009؟",a:["ميسي","إيتو","تشافي","هنري"],correct:1},
{q:"أي منتخب فاز بكأس آسيا 2019؟",a:["قطر","اليابان","كوريا","السعودية"],correct:0},
{q:"من سجل هدف فوز إسبانيا بنهائي 2010؟",a:["إنييستا","فيلا","توريس","تشافي"],correct:0},
{q:"أي منتخب فاز بكأس العالم 1994؟",a:["البرازيل","إيطاليا","ألمانيا","الأرجنتين"],correct:0},
{q:"من هو هداف كأس العالم 2002؟",a:["رونالدو","ريفالدو","كلوزه","رونالدينيو"],correct:0},
{q:"أي منتخب فاز بكأس العالم 1962؟",a:["البرازيل","تشيلي","ألمانيا","إيطاليا"],correct:0},
{q:"من اللاعب الذي سجل هدف فوز فرنسا بكأس العالم 2018 النهائي؟",a:["مبابي","غريزمان","بوغبا","لم يكن هدف فوز"],correct:3}

]

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
[array[i],array[j]]=[array[j],array[i]]
}
}

shuffle(questions)

function startTimer(){

clearInterval(timer)

time=8

document.getElementById("timer").innerText="⏳ الوقت: "+time

timer=setInterval(()=>{

time--

document.getElementById("timer").innerText="⏳ الوقت: "+time

if(time<=0){

clearInterval(timer)

autoAnswer()

}

},1000)

}

function autoAnswer(){

let q=questions[currentQuestion]

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

buttons[q.correct].classList.add("correct")

document.getElementById("result").innerText=
"⏰ انتهى الوقت! الإجابة الصحيحة: "+q.a[q.correct]

setTimeout(nextQuestion,1500)

}

function showQuestion(){

if(currentQuestion>=questions.length){
endGame()
return
}

startTimer()

let q=questions[currentQuestion]

document.getElementById("question").innerText=q.q

let answersDiv=document.getElementById("answers")

answersDiv.innerHTML=""

q.a.forEach((answer,index)=>{

let btn=document.createElement("button")

btn.innerText=answer

btn.onclick=function(){

clearInterval(timer)

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

if(index===q.correct){

score++

document.getElementById("score").innerText="⭐ السكور: "+score

btn.classList.add("correct")

document.getElementById("result").innerText="✅ إجابة صحيحة"

}else{

btn.classList.add("wrong")

buttons[q.correct].classList.add("correct")

document.getElementById("result").innerText=
"❌ الإجابة الصحيحة: "+q.a[q.correct]

}

setTimeout(nextQuestion,1200)

}

answersDiv.appendChild(btn)

})

}

function nextQuestion(){

currentQuestion++

document.getElementById("result").innerText=""

showQuestion()

}

function endGame(){

clearInterval(timer)

document.getElementById("question").innerText="🏁 انتهت اللعبة"

document.getElementById("answers").innerHTML=""

document.getElementById("timer").innerText=""

document.getElementById("result").innerHTML=

"⭐ نتيجتك: "+score+" / "+questions.length+

"<br><br><button onclick='restartGame()'>🔄 إعادة اللعب</button>"

}

function restartGame(){

score=0
currentQuestion=0

document.getElementById("score").innerText="⭐ السكور: 0"

shuffle(questions)

showQuestion()

}

function openAdmin(){

let panel=document.getElementById("adminPanel")

if(panel.style.display==="none"){
panel.style.display="block"
}else{
panel.style.display="none"
}

}

showQuestion()

</script>

</body>
</html>
