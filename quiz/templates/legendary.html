function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
let temp=array[i]
array[i]=array[j]
array[j]=temp
}
}

function shuffleAnswers(question){

let answers = question.a.map((answer,index)=>({
text:answer,
correct:index===question.correct
}))

shuffle(answers)

question.a = answers.map(a=>a.text)
question.correct = answers.findIndex(a=>a.correct)

}

shuffle(questions)

function startTimer(){

clearInterval(timer)

time=20

document.getElementById("timer").innerText="⏳ الوقت: "+time

timer=setInterval(()=>{

time--

document.getElementById("timer").innerText="⏳ الوقت: "+time

if(time<=0){

clearInterval(timer)

autoAnswer()

}

},1000)

}

function autoAnswer(){

let q=questions[currentQuestion]

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

if(buttons[q.correct]){
buttons[q.correct].classList.add("correct")
}

document.getElementById("result").innerText=
"⏰ انتهى الوقت! الإجابة الصحيحة: "+q.a[q.correct]

setTimeout(nextQuestion,1500)

}

function showQuestion(){
  if(currentQuestion >= questions.length){
    endGame();
    return;
  }

  // تحديث عداد الأسئلة
  document.getElementById("progress").innerText =
    "السؤال " + (currentQuestion + 1) + " / " + questions.length;

  let q = questions[currentQuestion];
  shuffleAnswers(q);
  startTimer();

  document.getElementById("question").innerText = q.q;

  let answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.a.forEach((answer, index) => {
    let btn = document.createElement("button");
    btn.innerText = answer;

    btn.onclick = function(){
      clearInterval(timer);
      let buttons = document.querySelectorAll("#answers button");
      buttons.forEach(b => b.disabled = true);

      if(index === q.correct){
        score++;
        document.getElementById("score").innerText = "⭐ السكور: " + score;
        btn.classList.add("correct");
        document.getElementById("result").innerText = "✅ إجابة صحيحة";
      } else {
        btn.classList.add("wrong");
        if(buttons[q.correct]) buttons[q.correct].classList.add("correct");
        document.getElementById("result").innerText = "❌ الإجابة الصحيحة: " + q.a[q.correct];
      }

      currentQuestion++;
      setTimeout(nextQuestion, 1500);
    };

    answersDiv.appendChild(btn);
  });
}

function nextQuestion(){

currentQuestion++

document.getElementById("result").innerText=""

showQuestion()

}

function endGame(){

clearInterval(timer)

document.getElementById("question").innerText="🏁 انتهت اللعبة"

document.getElementById("answers").innerHTML=""

document.getElementById("timer").innerText=""

let level=""

if(score<5){
level="مبتدئ 🐣"
}
else if(score<10){
level="جيد 👍"
}
else if(score<13){
level="محترف ⚽"
}
else{
level="أسطورة حقيقية 👑"
}

document.getElementById("result").innerHTML=

"⭐ نتيجتك: "+score+" / "+questions.length+
"<br>🏆 تقييمك: "+level+
"<br><br><button onclick='restartGame()'>🔄 إعادة اللعب</button>"

}

function restartGame(){

clearInterval(timer)

score=0
currentQuestion=0

document.getElementById("score").innerText="⭐ السكور: 0"
document.getElementById("result").innerText=""

shuffle(questions)

showQuestion()

}

function openAdmin(){

let pass=prompt("ادخل كلمة مرور المدير")

if(pass==="1234"){

let panel=document.getElementById("adminPanel")

panel.style.display =
panel.style.display==="none" ? "block" : "none"

}else{

alert("❌ كلمة المرور خاطئة")

}

}

showQuestion()

</script>
