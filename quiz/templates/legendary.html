
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>👑 المستوى الأسطوري</title>

<style>
body{
background:#0d1b2a;
font-family:Arial;
color:white;
text-align:center;
}

.container{
width:80%;
max-width:600px;
margin:80px auto;
background:#1b263b;
padding:30px;
border-radius:15px;
}

button{
display:block;
width:80%;
margin:12px auto;
padding:14px;
font-size:20px;
font-weight:bold;
border-radius:10px;
border:none;
cursor:pointer;
}

#timer{
font-size:22px;
color:#ffd60a;
margin-bottom:15px;
}
</style>
</head>

<body>
   <div class="container">

<h1>👑 المستوى الأسطوري</h1>
<button onclick="openAdmin()">لوحة المدير</button>

<div id="adminPanel" style="display:none; margin-bottom:20px;">

<h3>📊 لوحة المدير</h3>
<div>👥 المستخدمون النشطون: <span id="onlineUsers">0</span></div>
<div>📈 إجمالي الزوار: <span id="totalVisitors">0</span></div>
</div>

<div id="timer">⏳ الوقت: 8</div>

<h2 id="question"></h2>
<div id="answers"></div>
<h3 id="result"></h3>

</div>

<script>

let questions = [

{q:"من سجل أول هدف في تاريخ تصفيات كأس العالم؟",a:["يوهانس كروغر","جوزيف بروين","ويليام كينيدي","كارلوس ستيب"],correct:2},
{q:"في أي سنة لعبت أول مباراة دولية في تاريخ كرة القدم؟",a:["1868","1870","1872","1875"],correct:2},
{q:"من كان طرفا أول مباراة دولية رسمية؟",a:["إنجلترا واسكتلندا","إنجلترا وويلز","اسكتلندا وأيرلندا","إنجلترا وفرنسا"],correct:0},
{q:"كم انتهت أول مباراة دولية في التاريخ؟",a:["1-0","2-1","0-0","3-0"],correct:2},
{q:"في أي ملعب أقيمت أول مباراة دولية؟",a:["هامبدن بارك","أولد ترافورد","ويمبلي","كنسينغتون"],correct:0},

{q:"من سجل أول هدف في تاريخ الدوري الإسباني؟",a:["رافاييل مورينو أراندا","خوان إيرازكين","خوسيه برادو","ألفريدو دي ستيفانو"],correct:0},
{q:"في أي سنة بدأ الدوري الإسباني؟",a:["1928","1929","1930","1931"],correct:1},
{q:"كم فريق شارك في أول موسم من الدوري الإسباني؟",a:["8","10","12","14"],correct:1},
{q:"من فاز بأول لقب في الدوري الإسباني؟",a:["برشلونة","ريال مدريد","أتلتيك بيلباو","فالنسيا"],correct:0},
{q:"من كان هداف أول موسم في الدوري الإسباني؟",a:["تيلمو زارا","مانويل أوليفا","باكو بينا","خوان إيرازكين"],correct:3},

{q:"من سجل أول هدف في تاريخ الدوري الإيطالي بنظامه الحديث 1929؟",a:["أنجيلو سكيافيو","لويس مونتي","جوزيبي مياتزا","جيوفاني فيراري"],correct:0},
{q:"من فاز بأول دوري إيطالي بنظامه الحديث؟",a:["إنتر ميلان","يوفنتوس","بولونيا","تورينو"],correct:0},
{q:"في أي سنة تأسس الفيفا؟",a:["1902","1904","1905","1906"],correct:1},
{q:"في أي مدينة تأسس الاتحاد الدولي لكرة القدم؟",a:["باريس","لندن","زيورخ","أمستردام"],correct:0},
{q:"كم اتحاداً شارك في تأسيس الفيفا؟",a:["5","6","7","8"],correct:2},

{q:"من كان أول رئيس للفيفا؟",a:["روبرت غيران","جول ريميه","ستانلي روس","سيب بلاتر"],correct:0},
{q:"في أي سنة تأسس الاتحاد الإنجليزي لكرة القدم؟",a:["1861","1863","1865","1867"],correct:1},
{q:"كم نادياً شارك في تأسيس الاتحاد الإنجليزي؟",a:["11","12","13","14"],correct:1},
{q:"ما أول قانون تم إلغاؤه في كرة القدم بعد تأسيس الاتحاد الإنجليزي؟",a:["حمل الكرة باليد","التسلل","الركلات الحرة","ركلات الجزاء"],correct:0},
{q:"في أي سنة ظهرت ركلة الجزاء لأول مرة؟",a:["1891","1890","1892","1893"],correct:0},

{q:"من اقترح فكرة ركلة الجزاء في كرة القدم؟",a:["ويليام ماكروم","جيمس ماديسون","جون سميث","روبرت كينيدي"],correct:0},
{q:"في أي دولة اقترحت ركلة الجزاء لأول مرة؟",a:["إنجلترا","اسكتلندا","أيرلندا","ويلز"],correct:2},
{q:"في أي سنة ظهرت البطاقات الصفراء والحمراء لأول مرة في المونديال؟",a:["1966","1970","1974","1978"],correct:1},
{q:"من ابتكر فكرة البطاقات في كرة القدم؟",a:["كين أستون","ستانلي روس","جول ريميه","أرتيميو فرانكي"],correct:0},
{q:"في أي مونديال استخدمت البطاقات لأول مرة؟",a:["1970","1966","1974","1978"],correct:0},

{q:"من كان هداف أول بطولة أمم أوروبا 1960؟",a:["فرانسوا هويت","فالنتين إيفانوف","ميشيل بلاتيني","ليف ياشين"],correct:1},
{q:"أي منتخب فاز بأول بطولة أمم أوروبا؟",a:["الاتحاد السوفيتي","يوغوسلافيا","تشيكوسلوفاكيا","فرنسا"],correct:0},
{q:"في أي دولة أقيمت أول بطولة يورو؟",a:["فرنسا","إيطاليا","إسبانيا","بلجيكا"],correct:0},
{q:"كم منتخب شارك في النهائيات الأولى لليورو؟",a:["4","6","8","16"],correct:0},
{q:"من سجل هدف الفوز في نهائي يورو 1960؟",a:["فيكتور بونيديلنيك","ليف ياشين","إيفانوف","تشيسلينكو"],correct:0},

{q:"من سجل أول هدف في تاريخ كأس أمم أوروبا؟",a:["أناتولي إيلين","ميشيل بلاتيني","دي ستيفانو","بوشكاش"],correct:0},
{q:"في أي سنة تأسست بطولة كوبا أمريكا؟",a:["1914","1916","1918","1920"],correct:1},
{q:"في أي دولة أقيمت أول كوبا أمريكا؟",a:["الأرجنتين","الأوروغواي","البرازيل","تشيلي"],correct:0},
{q:"من فاز بأول كوبا أمريكا؟",a:["الأوروغواي","الأرجنتين","البرازيل","تشيلي"],correct:0},
{q:"كم منتخب شارك في أول كوبا أمريكا؟",a:["4","5","6","7"],correct:0},

{q:"من سجل أول هدف في تاريخ كوبا أمريكا؟",a:["إيزابيلينو غرادين","كارلوس سكاروني","هيكتور كاسترو","أنخل رومانو"],correct:0},
{q:"في أي سنة تأسس الاتحاد الآسيوي لكرة القدم؟",a:["1952","1954","1956","1958"],correct:1},
{q:"في أي مدينة تأسس الاتحاد الآسيوي؟",a:["مانيلا","طوكيو","بانكوك","كوالالمبور"],correct:0},
{q:"كم دولة شاركت في تأسيس الاتحاد الآسيوي؟",a:["12","14","16","18"],correct:0},
{q:"من فاز بأول كأس آسيا؟",a:["كوريا الجنوبية","إسرائيل","إيران","اليابان"],correct:0},

{q:"في أي سنة أقيمت أول كأس آسيا؟",a:["1954","1956","1958","1960"],correct:1},
{q:"في أي دولة أقيمت أول كأس آسيا؟",a:["هونغ كونغ","كوريا الجنوبية","اليابان","إيران"],correct:0},
{q:"كم منتخب شارك في أول كأس آسيا؟",a:["4","6","8","10"],correct:0},
{q:"من كان هداف أول كأس آسيا؟",a:["ناهوم ستيلماخ","ليو كوك مان","ساميوراي","كيم يونغ"],correct:0},
{q:"كم هدف سجل هداف كأس آسيا الأولى؟",a:["4","5","6","7"],correct:0},

{q:"من أول حكم أدار نهائي كأس العالم مرتين؟",a:["جون لانغينوس","آرثر إليس","نيكولا ريزولي","ساندور بول"],correct:1},
{q:"في أي سنة تأسس نادي أياكس أمستردام؟",a:["1898","1900","1902","1905"],correct:1},
{q:"من أول لاعب سجل هاتريك في تاريخ كأس العالم؟",a:["بيرت باتينود","غييرمو ستابيلي","ليبراتو","سكاروني"],correct:0},
{q:"في أي مونديال سجل أول هاتريك في التاريخ؟",a:["1930","1934","1938","1950"],correct:0},
{q:"أي منتخب سجل أول هدف عكسي في تاريخ كأس العالم؟",a:["المكسيك","الولايات المتحدة","إيطاليا","إسبانيا"],correct:0}
];

let currentQuestion = 0;
let time = 8;
let timer;

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

shuffle(questions);
function startTimer(){

clearInterval(timer);

time=8;

document.getElementById("timer").innerText="⏳ الوقت: "+time;

timer=setInterval(()=>{

time--;

document.getElementById("timer").innerText="⏳ الوقت: "+time;

if(time<=0){

clearInterval(timer);

let q = questions[currentQuestion];
let buttons = document.querySelectorAll("#answers button");

buttons.forEach(b => b.disabled = true);

let correctAnswer = q.a[q.correct];

document.getElementById("result").innerText =
"⏰ انتهى الوقت! الإجابة الصحيحة: " + correctAnswer;

setTimeout(()=>{

currentQuestion++;

if(currentQuestion<questions.length){
showQuestion();
}else{
endGame();
}

},1500);

}

},1000);

}
function showQuestion(){

document.getElementById("result").innerText="";
startTimer();

let q = questions[currentQuestion];

document.getElementById("question").innerText = q.q;

let answersDiv = document.getElementById("answers");
answersDiv.innerHTML = "";

let answers = q.a.map((a,i)=>({
text:a,
correct:i===q.correct
}));

shuffle(answers);

answers.forEach((answer,index)=>{

let btn = document.createElement("button");

btn.innerText = answer.text;

btn.onclick = function(){

clearInterval(timer);

let buttons = document.querySelectorAll("#answers button");
buttons.forEach(b=>b.disabled=true);

if(answer.correct){

btn.style.background="#00c853";
document.getElementById("result").innerText="✅ إجابة صحيحة";

}
else{

btn.style.background="#d50000";

answers.forEach((a,i)=>{
if(a.correct){
buttons[i].style.background="#00c853";
}
});

document.getElementById("result").innerText =
"❌ الإجابة الصحيحة: "+answers.find(a=>a.correct).text;

}

currentQuestion++;

setTimeout(()=>{

document.getElementById("result").innerText="";

if(currentQuestion<questions.length){
showQuestion();
}else{
endGame();
}

},1200);

};

answersDiv.appendChild(btn);

});

}
function endGame(){

document.getElementById("question").innerText="🏁 انتهت اللعبة";
document.getElementById("answers").innerHTML="";
document.getElementById("timer").innerText="";
document.getElementById("result").innerText="👏 خلصت المستوى الأسطوري";

}

function openAdmin(){

let panel = document.getElementById("adminPanel");

if(panel.style.display === "none"){
panel.style.display = "block";
}else{
panel.style.display = "none";
}

}

showQuestion();

</script>
</body>
</html>
