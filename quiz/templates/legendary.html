<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>👑 المستوى الأسطوري</title>

<style>

body{
background:#0d1b2a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.container{
width:80%;
max-width:600px;
margin:80px auto;
background:#1b263b;
padding:30px;
border-radius:15px;
}

button{
display:block;
width:80%;
margin:12px auto;
padding:14px;
font-size:20px;
font-weight:bold;
border-radius:10px;
border:none;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

#timer{
font-size:22px;
color:#ffd60a;
margin-bottom:10px;
}

#score{
font-size:22px;
color:#00e5ff;
margin-bottom:15px;
}

#adminPanel{
background:#0f2027;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>👑 المستوى الأسطوري</h1>

<button onclick="openAdmin()">⚙ لوحة المدير</button>

<div id="adminPanel" style="display:none">

<h3>📊 لوحة المدير</h3>

<div>👥 المستخدمون النشطون: <span id="onlineUsers">15</span></div>

<div>📈 إجمالي الزوار: <span id="totalVisitors">1200</span></div>

</div>

<div id="score">⭐ السكور: 0</div>

<div id="timer">⏳ الوقت: 8</div>

<h2 id="question"></h2>

<div id="answers"></div>

<h3 id="result"></h3>

<a href="/"><button>🏠 الرجوع للرئيسية</button></a>

</div>

<script>

let score = 0
let currentQuestion = 0
let time = 8
let timer

let questions = [

{q:"من سجل أول هدف في تاريخ تصفيات كأس العالم؟",a:["يوهانس كروغر","جوزيف بروين","ويليام كينيدي","كارلوس ستيب"],correct:2},
{q:"في أي سنة لعبت أول مباراة دولية في تاريخ كرة القدم؟",a:["1868","1870","1872","1875"],correct:2},
{q:"من كان طرفا أول مباراة دولية رسمية؟",a:["إنجلترا واسكتلندا","إنجلترا وويلز","اسكتلندا وأيرلندا","إنجلترا وفرنسا"],correct:0},
{q:"كم انتهت أول مباراة دولية في التاريخ؟",a:["1-0","2-1","0-0","3-0"],correct:2},
{q:"في أي ملعب أقيمت أول مباراة دولية؟",a:["هامبدن بارك","أولد ترافورد","ويمبلي","كنسينغتون"],correct:0}

]

function shuffle(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

[array[i],array[j]]=[array[j],array[i]]

}

}

shuffle(questions)

function startTimer(){

clearInterval(timer)

time = 8

document.getElementById("timer").innerText="⏳ الوقت: "+time

timer=setInterval(()=>{

time--

document.getElementById("timer").innerText="⏳ الوقت: "+time

if(time<=0){

clearInterval(timer)

autoAnswer()

}

},1000)

}

function autoAnswer(){

let q=questions[currentQuestion]

let correct=q.a[q.correct]

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

buttons[q.correct].style.background="#00c853"

document.getElementById("result").innerText=
"⏰ انتهى الوقت! الإجابة الصحيحة: "+correct

setTimeout(nextQuestion,1500)

}

function showQuestion(){

startTimer()

let q=questions[currentQuestion]

document.getElementById("question").innerText=q.q

let answersDiv=document.getElementById("answers")

answersDiv.innerHTML=""

let answers=q.a.map((text,i)=>{

return {text:text,correct:i===q.correct}

})

shuffle(answers)

answers.forEach((answer,index)=>{

let btn=document.createElement("button")

btn.innerText=answer.text

btn.onclick=function(){

clearInterval(timer)

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

if(answer.correct){

score++

document.getElementById("score").innerText="⭐ السكور: "+score

btn.style.background="#00c853"

document.getElementById("result").innerText="✅ إجابة صحيحة"

}else{

btn.style.background="#d50000"

answers.forEach((a,i)=>{
if(a.correct){
buttons[i].style.background="#00c853"
}
})

document.getElementById("result").innerText=
"❌ الإجابة الصحيحة: "+answers.find(a=>a.correct).text

}

setTimeout(nextQuestion,1200)

}

answersDiv.appendChild(btn)

})

}

function nextQuestion(){

currentQuestion++

document.getElementById("result").innerText=""

if(currentQuestion<questions.length){

showQuestion()

}else{

endGame()

}

}

function endGame(){

document.getElementById("question").innerText="🏁 انتهت اللعبة"

document.getElementById("answers").innerHTML=""

document.getElementById("timer").innerText=""

document.getElementById("result").innerHTML=

"⭐ نتيجتك: "+score+" / "+questions.length+

"<br><br><button onclick='restartGame()'>🔄 إعادة اللعب</button>"

}

function restartGame(){

score=0
currentQuestion=0

document.getElementById("score").innerText="⭐ السكور: 0"

shuffle(questions)

showQuestion()

}

function openAdmin(){

let panel=document.getElementById("adminPanel")

if(panel.style.display==="none"){

panel.style.display="block"

}else{

panel.style.display="none"

}

}

showQuestion()

</script>

</body>
</html>
