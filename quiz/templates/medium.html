<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مستوى المتوسط</title>

<style>

body{
background:#0d1b2a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.container{
width:90%;
max-width:600px;
margin:60px auto;
background:#1b263b;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}



button{
display:block;
width:90%;
margin:12px auto;
padding:14px;
font-size:18px;
font-weight:bold;
border-radius:10px;
border:none;
cursor:pointer;
background:#415a77;
color:white;
transition:0.2s;
}

button:hover{
background:#778da9;
}

#timer{
font-size:22px;
margin:10px;
color:#ffd600;
}

#score{
font-size:22px;
color:#00e5ff;
margin-bottom:10px;
}

.correct{
background:#00c853 !important;
}

.wrong{
background:#d50000 !important;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 مستوى المتوسط</h1>

<div id="score">⭐ السكور: 0</div>

<h2 id="question"></h2>

<div id="timer"></div>

<div id="answers"></div>

<h3 id="result"></h3>

<a href="/"><button>🏠 الرجوع للرئيسية</button></a>

</div>

<script>

let questions=[

{q:"كم عدد لاعبي الفريق في كرة القدم داخل الملعب؟",a:["9","10","11","12"],correct:2},
{q:"أي منتخب فاز بكأس العالم 2018؟",a:["فرنسا","كرواتيا","البرازيل","الأرجنتين"],correct:0},
{q:"في أي دولة أقيم كأس العالم 2014؟",a:["البرازيل","روسيا","ألمانيا","جنوب أفريقيا"],correct:0},
{q:"من فاز بدوري أبطال أوروبا 2022؟",a:["ريال مدريد","ليفربول","بايرن ميونخ","مانشستر سيتي"],correct:0},
{q:"من هو الهداف التاريخي لريال مدريد؟",a:["رونالدو","بنزيما","راؤول","دي ستيفانو"],correct:0},
{q:"أي منتخب فاز بكأس العالم 2006؟",a:["إيطاليا","فرنسا","ألمانيا","البرازيل"],correct:0},
{q:"من هو اللاعب الذي سجل هدف فوز إسبانيا بكأس العالم 2010؟",a:["إنييستا","تشافي","فيلا","توريس"],correct:0},
{q:"أي نادي يلعب له محمد صلاح؟",a:["ليفربول","تشيلسي","روما","ميلان"],correct:0},
{q:"كم مرة فاز البرازيل بكأس العالم؟",a:["4","5","6","7"],correct:1},
{q:"من هو الهداف التاريخي لكأس العالم؟",a:["كلوزه","رونالدو","مولر","بيليه"],correct:0},

{q:"أي منتخب فاز بكأس آسيا 2015؟",a:["أستراليا","اليابان","كوريا الجنوبية","السعودية"],correct:0},
{q:"في أي سنة فاز برشلونة بالسداسية؟",a:["2009","2010","2011","2012"],correct:0},
{q:"أي فريق فاز بدوري أبطال أوروبا 2019؟",a:["ليفربول","توتنهام","برشلونة","ريال مدريد"],correct:0},
{q:"من هو اللاعب البرتغالي الشهير الملقب بالدون؟",a:["كريستيانو رونالدو","فيغو","ديكو","ناني"],correct:0},
{q:"أي منتخب فاز بكأس العالم 1998؟",a:["فرنسا","البرازيل","إيطاليا","ألمانيا"],correct:0},
{q:"كم مدة مباراة كرة القدم الرسمية؟",a:["80 دقيقة","90 دقيقة","100 دقيقة","120 دقيقة"],correct:1},
{q:"أي نادي فاز بدوري الأبطال 2013؟",a:["بايرن ميونخ","بوروسيا دورتموند","ريال مدريد","برشلونة"],correct:0},
{q:"من هو الهداف التاريخي لبرشلونة؟",a:["ميسي","سواريز","رونالدينيو","نيمار"],correct:0},
{q:"أي منتخب فاز بكأس العالم 2014؟",a:["ألمانيا","الأرجنتين","البرازيل","إسبانيا"],correct:0},
{q:"في أي دولة يقام الدوري الإنجليزي الممتاز؟",a:["إنجلترا","إسبانيا","إيطاليا","ألمانيا"],correct:0},

{q:"من هو اللاعب الذي سجل هدف فوز ألمانيا بنهائي 2014؟",a:["غوتزه","مولر","أوزيل","كروس"],correct:0},
{q:"أي نادي فاز بدوري الأبطال 2010؟",a:["إنتر ميلان","بايرن ميونخ","برشلونة","تشيلسي"],correct:0},
{q:"من هو الحارس الأسطوري لإيطاليا؟",a:["بوفون","كاسياس","نوير","تشيزني"],correct:0},
{q:"أي منتخب فاز بكأس العالم 1970؟",a:["البرازيل","إيطاليا","ألمانيا","الأرجنتين"],correct:0},
{q:"من اللاعب الذي فاز بالكرة الذهبية 2018؟",a:["مودريتش","ميسي","رونالدو","غريزمان"],correct:0},
{q:"أي نادي يلعب في ملعب الكامب نو؟",a:["برشلونة","ريال مدريد","فالنسيا","إشبيلية"],correct:0},
{q:"أي منتخب فاز بكأس أمم أوروبا 2016؟",a:["البرتغال","فرنسا","ألمانيا","إسبانيا"],correct:0},
{q:"من هو هداف كأس العالم 2014؟",a:["خاميس رودريغيز","مولر","ميسي","روبن"],correct:0},
{q:"أي نادي فاز بدوري الأبطال 2020؟",a:["بايرن ميونخ","باريس سان جيرمان","ليفربول","ريال مدريد"],correct:0},
{q:"في أي قارة تقع دولة الأرجنتين؟",a:["أمريكا الجنوبية","أوروبا","آسيا","إفريقيا"],correct:0}

]

let currentQuestion=0
let score=0
let timer
let timeLeft=10



function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
[array[i],array[j]]=[array[j],array[i]]
}
}

shuffle(questions)

function startTimer(){

clearInterval(timer)

timeLeft=10

document.getElementById("timer").innerText="⏳ الوقت: "+timeLeft

timer=setInterval(()=>{

timeLeft--

document.getElementById("timer").innerText="⏳ الوقت: "+timeLeft

if(timeLeft<=0){
clearInterval(timer)
autoAnswer()
}

},1000)

}

function autoAnswer(){

let q=questions[currentQuestion]

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

if(buttons[q.correct]){
buttons[q.correct].classList.add("correct")
}

document.getElementById("result").innerText="⏰ انتهى الوقت! الإجابة: "+q.a[q.correct]

setTimeout(nextQuestion,1500)

}

function showQuestion(){

if(currentQuestion>=questions.length){
endGame()
return
}

startTimer()

let q=questions[currentQuestion]

document.getElementById("question").innerText=q.q

let answersDiv=document.getElementById("answers")

answersDiv.innerHTML=""

q.a.forEach((answer,index)=>{

let btn=document.createElement("button")

btn.innerText=answer

btn.onclick=function(){

clearInterval(timer)

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

if(index===q.correct){

score++

document.getElementById("score").innerText="⭐ السكور: "+score

btn.classList.add("correct")

document.getElementById("result").innerText="✅ إجابة صحيحة!"

}else{

btn.classList.add("wrong")

if(buttons[q.correct]){
buttons[q.correct].classList.add("correct")
}

document.getElementById("result").innerText="❌ الإجابة الصحيحة: "+q.a[q.correct]

}

currentQuestion++

setTimeout(nextQuestion,1500)

}

answersDiv.appendChild(btn)

})

}

function nextQuestion(){
document.getElementById("result").innerText=""
showQuestion()
}

function endGame(){

clearInterval(timer)

document.getElementById("question").innerText="🎉 انتهت الأسئلة!"

document.getElementById("answers").innerHTML=""

document.getElementById("timer").innerText=""

document.getElementById("result").innerHTML=

"⭐ نتيجتك: "+score+" / "+questions.length+

"<br><br><button onclick='restartGame()'>🔄 إعادة اللعب</button>"

}

function restartGame(){

score=0
currentQuestion=0

document.getElementById("score").innerText="⭐ السكور: 0"

shuffle(questions)

showQuestion()

}

showQuestion()

</script>

</body>
</html>
