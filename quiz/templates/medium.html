{q:"أي لاعب فاز بالكرة الذهبية 2022؟",a:["كريم بنزيما","ميسي","ليفاندوفسكي","هالاند"],correct:0},

{q:"أي نادي يلقب بالبلوز؟",a:["تشيلسي","مانشستر سيتي","إيفرتون","ليستر"],correct:0},

{q:"من هو قائد منتخب الأرجنتين في مونديال 2022؟",a:["ميسي","دي ماريا","أوتامندي","مارتينيز"],correct:0},

{q:"أي نادي فاز بدوري الأبطال 2010؟",a:["إنتر ميلان","بايرن ميونخ","برشلونة","تشيلسي"],correct:0},

{q:"أي منتخب فاز بكأس العالم 1970؟",a:["البرازيل","إيطاليا","ألمانيا","الأرجنتين"],correct:0},

{q:"من هو مدرب ريال مدريد 2024؟",a:["كارلو أنشيلوتي","زيدان","مورينيو","أليغري"],correct:0},

{q:"أي لاعب سجل أكثر أهداف في تاريخ دوري الأبطال؟",a:["كريستيانو رونالدو","ميسي","ليفاندوفسكي","بنزيما"],correct:0},

{q:"أي منتخب فاز بكأس العالم 1966؟",a:["إنجلترا","ألمانيا","البرازيل","الأرجنتين"],correct:0},

{q:"أي لاعب فرنسي فاز بالكرة الذهبية 1998؟",a:["زين الدين زيدان","هنري","بلاتيني","تريزيغيه"],correct:0},

{q:"أي نادي فاز بدوري الأبطال 2005؟",a:["ليفربول","ميلان","يوفنتوس","تشيلسي"],correct:0},

{q:"أي منتخب فاز بكأس العالم 1986؟",a:["الأرجنتين","ألمانيا","البرازيل","إيطاليا"],correct:0}

]

let currentQuestion=0
let score=0
let timer
let timeLeft=10


function shuffle(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

let temp=array[i]
array[i]=array[j]
array[j]=temp

}

}

function shuffleAnswers(question){

let answers = question.a.map((answer,index)=>({
text:answer,
correct:index===question.correct
}))

shuffle(answers)

question.a = answers.map(a=>a.text)
question.correct = answers.findIndex(a=>a.correct)

}


shuffle(questions)


function startTimer(){

clearInterval(timer)

timeLeft=10

document.getElementById("timer").innerText="⏳ الوقت: "+timeLeft

timer=setInterval(function(){

timeLeft--

document.getElementById("timer").innerText="⏳ الوقت: "+timeLeft

if(timeLeft<=0){

clearInterval(timer)
autoAnswer()

}

},1000)

}


function autoAnswer(){

let q=questions[currentQuestion]

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

if(buttons[q.correct]){
buttons[q.correct].classList.add("correct")
}

document.getElementById("result").innerText="⏰ انتهى الوقت! الإجابة: "+q.a[q.correct]

setTimeout(nextQuestion,1500)

}


function showQuestion(){

if(currentQuestion>=questions.length){
endGame()
return
}

let q=questions[currentQuestion]

shuffleAnswers(q)

startTimer()

document.getElementById("question").innerText=q.q

let answersDiv=document.getElementById("answers")

answersDiv.innerHTML=""

q.a.forEach((answer,index)=>{

let btn=document.createElement("button")

btn.innerText=answer

btn.onclick=function(){

clearInterval(timer)

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

if(index===q.correct){

score++

document.getElementById("score").innerText="⭐ السكور: "+score

btn.classList.add("correct")

document.getElementById("result").innerText="✅ إجابة صحيحة"

}else{

btn.classList.add("wrong")

if(buttons[q.correct]){
buttons[q.correct].classList.add("correct")
}

document.getElementById("result").innerText="❌ الإجابة الصحيحة: "+q.a[q.correct]

}

currentQuestion++

setTimeout(nextQuestion,1500)

}

answersDiv.appendChild(btn)

})

}


function nextQuestion(){

document.getElementById("result").innerText=""

showQuestion()

}


function endGame(){

clearInterval(timer)

document.getElementById("question").innerText="🎉 انتهت الأسئلة"

document.getElementById("answers").innerHTML=""

document.getElementById("timer").innerText=""

document.getElementById("result").innerHTML=

"⭐ نتيجتك: "+score+" / "+questions.length+

"<br><br><button onclick='restartGame()'>🔄 إعادة اللعب</button>"

}


function restartGame(){

score=0
currentQuestion=0

document.getElementById("score").innerText="⭐ السكور: 0"

shuffle(questions)

showQuestion()

}

showQuestion()

</script>

</body>
