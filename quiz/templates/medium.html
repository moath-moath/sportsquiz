<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مستوى المتوسط</title>

<style>

body{
background:#0d1b2a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.container{
width:90%;
max-width:600px;
margin:60px auto;
background:#1b263b;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
margin-bottom:10px;
}

button{
display:block;
width:90%;
margin:12px auto;
padding:14px;
font-size:18px;
font-weight:bold;
border-radius:10px;
border:none;
cursor:pointer;
background:#415a77;
color:white;
transition:0.2s;
}

button:hover{
background:#778da9;
}

#timer{
font-size:22px;
margin:10px;
color:#ffd600;
}

#score{
font-size:22px;
color:#00e5ff;
margin-bottom:10px;
}

.correct{
background:#00c853 !important;
}

.wrong{
background:#d50000 !important;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 مستوى المتوسط</h1>

<div id="score">⭐ السكور: 0</div>

<h2 id="question"></h2>

<div id="timer"></div>

<div id="answers"></div>

<h3 id="result"></h3>

<a href="/"><button>🏠 الرجوع للرئيسية</button></a>

</div>

<script>

let questions = [

{q:"من فاز بكأس العالم 1970؟",a:["البرازيل","إيطاليا","ألمانيا","الأرجنتين"],correct:0},
{q:"من فاز بكأس العالم 1974؟",a:["ألمانيا الغربية","هولندا","البرازيل","الأرجنتين"],correct:0},
{q:"من فاز بكأس العالم 1978؟",a:["البرازيل","الأرجنتين","ألمانيا","إيطاليا"],correct:1},
{q:"من فاز بكأس العالم 1982؟",a:["إيطاليا","ألمانيا","البرازيل","الأرجنتين"],correct:0},
{q:"من فاز بكأس العالم 1990؟",a:["الأرجنتين","إيطاليا","ألمانيا الغربية","البرازيل"],correct:2},

{q:"في أي دولة أقيم كأس العالم 2010؟",a:["البرازيل","جنوب أفريقيا","ألمانيا","اليابان"],correct:1},
{q:"في أي دولة أقيم كأس العالم 2006؟",a:["ألمانيا","فرنسا","إيطاليا","الولايات المتحدة"],correct:0},
{q:"في أي دولة أقيم كأس العالم 1998؟",a:["إيطاليا","فرنسا","البرازيل","ألمانيا"],correct:1},
{q:"في أي دولة أقيم كأس العالم 2002؟",a:["اليابان وكوريا الجنوبية","الصين","أستراليا","الهند"],correct:0},
{q:"في أي دولة أقيم كأس العالم 1994؟",a:["المكسيك","البرازيل","الولايات المتحدة","إسبانيا"],correct:2}

];

let currentQuestion = 0
let score = 0
let timer
let timeLeft = 10

shuffle(questions)

function shuffle(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

[array[i],array[j]]=[array[j],array[i]]

}

}

function startTimer(){

clearInterval(timer)

timeLeft=10

document.getElementById("timer").innerText="⏳ الوقت: "+timeLeft

timer=setInterval(()=>{

timeLeft--

document.getElementById("timer").innerText="⏳ الوقت: "+timeLeft

if(timeLeft<=0){

clearInterval(timer)

autoAnswer()

}

},1000)

}

function autoAnswer(){

let q=questions[currentQuestion]

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

buttons[q.correct].classList.add("correct")

document.getElementById("result").innerText="⏰ انتهى الوقت! الإجابة: "+q.a[q.correct]

currentQuestion++

setTimeout(nextQuestion,1500)

}

function showQuestion(){

startTimer()

let q=questions[currentQuestion]

document.getElementById("question").innerText=q.q

let answersDiv=document.getElementById("answers")

answersDiv.innerHTML=""

q.a.forEach((answer,index)=>{

let btn=document.createElement("button")

btn.innerText=answer

btn.onclick=function(){

clearInterval(timer)

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

if(index===q.correct){

score++

document.getElementById("score").innerText="⭐ السكور: "+score

btn.classList.add("correct")

document.getElementById("result").innerText="✅ إجابة صحيحة!"

}else{

btn.classList.add("wrong")

buttons[q.correct].classList.add("correct")

document.getElementById("result").innerText="❌ الإجابة الصحيحة: "+q.a[q.correct]

}

currentQuestion++

setTimeout(nextQuestion,1500)

}

answersDiv.appendChild(btn)

})

}

function nextQuestion(){

document.getElementById("result").innerText=""

if(currentQuestion<questions.length){

showQuestion()

}else{

clearInterval(timer)

document.getElementById("question").innerText="🎉 انتهت الأسئلة!"

document.getElementById("answers").innerHTML=""

document.getElementById("timer").innerText=""

document.getElementById("result").innerHTML=

"⭐ نتيجتك: "+score+" / "+questions.length+

"<br><br><button onclick='restartGame()'>🔄 إعادة اللعب</button>"

}

}

function restartGame(){

score=0

currentQuestion=0

document.getElementById("score").innerText="⭐ السكور: 0"

shuffle(questions)

showQuestion()

}

showQuestion()

</script>

</body>
</html>
